body:
  text: 勅建西天寺武林後學沙門性起述二藏教分攝三一總標第二藏教分攝者二釋文二初略釋藏即三藏二藏教即五教分即十二分二廣釋三一釋三藏二藏文二一釋三藏文二一列名釋義又二初列名言三藏者一修多羅藏二毗奈耶藏三阿毗達摩藏二釋三藏義三一釋經藏名義三初標名今初修多羅藏者梵語二釋名義此云契經謂上契二諦三諦四諦之理下合異類眾生之機方名契經即貫義攝義常義法義謂貫穿一切義理攝持所化眾生常即古今不易法即十界同歸三引餘名證更有雜心五義或曰涌泉注而無竭故或曰出生則輾轉滋多義味故或曰顯示以佛聖教顯示事理真俗故或曰繩墨楷定邪正無偏曲故或曰結蔓能貫能攝如結蔓故總上五義不出貫攝常法四義等故餘義等名恐煩不引鈔餘義等名者西域更稱云席經或曰線或曰聖教古德見此儒墨皆稱為經遂借彼席經以目聖教雙含二義俱順兩方借義助名更加契字揀異席經甚為允當故曰恐煩不引二釋律藏名義三初標名一毗奈耶藏者梵語二釋名義此名調伏調練三業通於止作制伏唯明于止止即三業七支各各防非作是三業七支各各俱善是以不但永斷十惡而防非轉更勤修十善而培德即諸惡莫作眾善奉行之義也三引餘名證或曰毗尼此翻滅義從因至果有滅義故或云尸羅此翻清凉除煩惱熱有清凉義故或云波羅提木叉此翻別解脫離諸過惡有解脫義故雖梵音楚夏而大旨無殊悉調伏義故鈔從因至果有滅義故一滅業非謂不殺盜等故律中云毗尼二滅煩惱是發業之本故律云為調伏貪等令盡是故世尊制增戒學三得滅果即無為果故戒經云戒淨有智慧便得第一道故前二是因後一是果解脫者梵語波羅木叉此翻別解脫此就因得名然有二義一揀定道名之為別二三業七支各各防非故名為別亦翻隨順解脫此據果立隨順有為無為二種解脫果故亦云性善如十誦律亦名守信如昔所受實能持故三釋論藏名義三一標名三阿毗達摩藏者梵語二釋名義此云對法然法有二種一勝義法謂涅槃是善是常故名勝義法二法相法通四聖諦相者性也狀也二俱名相法既有二對亦有二一者對向謂向前涅槃故二者對觀觀前四真諦理故其能對者皆無漏淨慧及相應心所故由對果對境分二名故故慧但是對而非是法非所對故舊譯為無比法以詮勝慧故鈔慧者是五別境中慧相應心所即五徧行心所作意觸受想思與八識心王相應故由對果對境下謂涅槃為果四諦為境涅槃四諦二種為所對無漏淨慧為能對故云慧但是能對屬心而非是果法及四諦境法為所對故由斯淨慧心能對果境二法而成論之義故三引餘名證或曰優波提舍此翻論義賓主問答有往復故或云磨怛理迦此翻本母以教與義為本母故或曰磨夷此翻行母以依教義而成行之母故雖梵音不同皆屬對之義故鈔教為能詮義為所詮為依教義而成諸乘行故二攝屬所歸今此經者正屬修多羅藏兼律論故文云如來滅後後五百年有持戒修福者於此章句能生信心以此為實豈非般若之法總以持戒而為其本兼律義故前後上下之文全以賓主問答往復窮通斷疑生信兼論義故鈔前五百年解脫堅固第二五百年禪定堅固第三五百年持戒堅固第四五百年多聞堅固第五五百年塔寺堅固後五百歲者近于鬪諍堅固又前兩個五百年正是正法一千年次兩個五百年乃像季一千年次後兩個五百年正是末法一萬年初季尚有持戒修福者言此經有大根機而受持者總以多生劫來即持戒定人為本基故義兼律儀故須菩提謁而問之世尊答而斷之斯為賓主往復問答是為論義所攝故以上三藏列名釋義竟二釋二藏文二一正釋二藏名義又二初標立名言二藏者二釋義又二一示名義一聲聞藏二菩薩藏即前三藏之教詮示聲聞理行果故名聲聞藏詮示菩薩理行果故名菩薩藏鈔聲聞者因聞苦集滅道四諦法音而依教奉行修自利法名為聲聞行六度萬行等修二利法名為菩薩即前經律論三藏教典詮示小乘生空理詮示小乘戒定慧行詮示小乘偏真涅槃果德由斯詮示小乘教行理果四法攝屬聲聞藏故又前教是能詮理行果等為所詮又菩薩藏中教即十二分理即二空真如理行即六度妙行等果即是無餘大涅槃果德由斯四法攝屬菩薩藏故二攝歸半滿又由緣覺之人多不習教出無佛世時攝屬聲聞故但分為二即大小半滿之不同耳鈔緣覺有二一聞十二因緣悟得果者名為緣覺二出無佛世時如釋迦往昔為忍辱仙人獨自了明名為獨覺獨覺又二一不發大乘者自真獨覺二已發大乘者是假名獨覺因由不籍教故攝歸聲聞藏若已發大乘者攝歸菩薩藏半滿之不同耳者一九部法為半法花云我此九部法隨順眾生說二十二部法為滿字教如華嚴等故又古德判一代時教一有相教二無相教三同歸教四常住教前有相教為半後之三教為滿又三教中前無相教為半以無相者未純顯中道義故後之二教為滿以純顯常住中道了義故是知半滿未局聲聞故曰不同耳二攝屬所歸今此經者屬菩薩藏攝文云此經如來為發大乘等即菩薩藏攝故鈔此般若法是諸佛母三藏之骨髓萬行之本源菩薩之所歸諸佛之所證非菩薩藏攝而何如來為大乘等等者等下文故經云如來為發大乘說為發最上乘者說又云樂小法者不能聽受讀誦為人分別解說等故不屬聲聞藏屬菩薩藏攝以願示大乘二空真如圓頓法故以上釋三藏二藏若名若義一科已竟二釋五教文二初釋五教名義分三初標言五教者二釋名義文五初釋小乘又二初立名一小乘者鈔賢首大師依華嚴經判一代時教立為五教初小乘法即天台藏教以天台立藏教名故受招難以濫三藏名義故賢首立小教名耳二釋所說唯是人空縱少說法空亦不明顯以依六識三毒建立染淨根本未盡法源故鈔初小乘中四一約法數多少二約二空差別三約所依根本四結成有餘今初言七十五法者五類法中有多少故謂色法十一俱舍頌云色者五根五境及無表色二心法一即是意識三心所有法共四十六謂大地法有十俱舍頌云受想思觸欲慧念與作意勝解三摩地遍於一切心大善地法有十頌云信及不放逸輕安捨慚愧二根及不害勤唯遍善心大煩惱六痴逸怠不信昏掉恒唯染大不善有二謂無慚及無愧小煩惱法有十頌云忿覆慳嫉惱害恨諂誑驕如是類名為煩惱地法不定有八謂悔眠尋伺貪嗔并慢疑上之六類有四十六四者不相應行法十四一得二非得三同分四無想異熱五無想定六滅盡定七命根八生九住十異十二名十三句十四句文故頌云得非得同分無想二定命及生住異滅并名句文身五者無為有三一擇滅二非擇滅三虗空總上五類之法合七十五法於此大乘欠二十五次下當明今文中雖不云數義含在內所說唯是人空下二明二空差別謂二乘人以其根劣未堪聞說二空真理故故智論三十一云小乘弟子鈍根故為眾說生空起信論云法我見者依二乘根純故如來但為說人無我等縱說二空少未明顯以依六識三毒建立下三明所依根本然小乘計生死根本雖有多種略舉其三一計識心如正理論第八說經部師以現在色心等為染淨因意云如大乘中第八為所熏故二者三毒為因義如大乘中明前七識為能熏故令引阿含但證三毒耳而云等者謂以三毒為因緣故起於三業三業因緣故起於三界是故一切法中論十二因緣品云眾生痴所覆為後起三行以有此行故識受六道身等即其義也三者今取上二義同有能所熏熏方流轉故若爾焉異大乘然則以參經意而不同者但六識非第八為所熏縱說賴耶但有名字能熏又非七識故全不同四者未盡法源故者謂由無為法只有擇滅非擇滅虗空等三種而未有真如等無為明二空故所以未盡法源故耳二釋始教文二初列名二大乘始教鈔大者簡小為義乘者運載為義由前小乘教中只能自利今大乘中而普運一切故云為大始者因對後已盡之說今此教中未盡之說故名為始耳二釋文二一釋名義由第二時但明于空第三時說三乘不許定性闡提成佛未盡大乘至極之說故名為始有成佛有不成佛復名為分鈔第二時但明於空者依智光論師判一代時教由前第一時小乘教中明心境俱有第二時為中根人說法相大乘境空心有顯唯識道理以中根猶劣未能全入平等真空故今疏云第二時但明于空第三時為最上根說無相大乘辨心境俱空平等一味故疏第三時說三乘不許下非智光論師第三時義即單取戒賢大師依深密經中意云初小乘中說獨佛一人有大覺性餘不說有故皆不成次一向成是第二時中唯說一乘一切眾生皆得成佛為一向成若盡成為太過若盡不成為太不及故皆為方便並為不了以初未堪聞大一向抑故第二時勸令欣佛一向揚故第三時中說三乘依理正說有性皆成佛無性不成佛非太過也故稱為了以普發一切乘故此依深密經中意是權說也何則夫深密中指第二時云許一切眾生成佛是法華最上一乘之實說焉可依深密中云第二時暗指法華為不了義乎故清涼云誰判法華為不了義耶又深密經中云一切趣寂聲聞種性雖蒙諸佛教化終不能當得阿耨菩提斯皆決定不許定性二乘及無性闡提成佛豈實說耶故云未盡大乘至極之說故今取智光論師第二時判義謂境空心有法相大乘及依深密經中第三時教義今賢首大師總合一教乃大乘之初門俱即不了故立為始復名為分以有成佛云有不成佛故乃立分耳二釋教義所說則廣談法相少及法性其所云性亦是相數以依八識建立生死及涅槃因諸義類故鈔所說則廣談法相下云大乘法相有一百數謂色法十一心法有八心所有五十一心不相應行有二十四無為有六故成百數於前小乘七十五中加二十五謂心法加七小乘唯一意識故心所加五不相應行加十無為加三並如彼說疏少及法性者法相法有九十四數而無為屬性只得六數故少及法性云耳其所云性亦是相數今無為法是法性義尚以決擇分明而有六數者則可知雖云其性亦在名相數耳疏以依八識下謂小乘法以第六意識為染淨因今始教中以依第八識而有涅槃故云無始時來界一切法等依由此有諸趣及涅槃證得界即因義謂種子等疏云諸義類者即總結始教中多義也乃是疏中敝煩意耳若欲廣知具如唯識論及花嚴玄談中說三終教文二初立名三大乘終教鈔前大乘始教中未盡之說故此教中已盡之說故名為終若依智光論師判義正是第三無相大乘中義雖後頓圓二教亦在義中少分攝耳二釋文二初釋名義由出中道妙有定性闡提皆當作佛方盡大乘至極之說故名為終稱實理故復名實教鈔由出中道妙有下以實相離相中道妙有非色非空故虗相本盡真性本現一切眾生本來是佛豈以定性二乘及無性闡提而無成佛者乎前始教中有成佛有不成佛故今此教中許一切眾生悉當成佛比前義勝故云方盡大乘至極之說名為終耳由純顯實相妙理故復名為實教二釋教義所說則多談法性少及法相其所云相亦會歸于性以依如來藏隨緣成立諸義類故鈔所說則多談法性下以唯顯實相第一義故其所云相亦會歸于性者如說五蘊五蘊即空空即法性又華嚴云三世五蘊法說名為世間彼滅非世間如是但假名又云有諍說生死無諍說涅槃生死及涅槃二俱不可得等又如說心心即離念即如此經雖云行施度等行皆歸離相妙行是般若性故云其所云相亦會歸于性耳以依八識如來藏隨緣成立諸義類故者如來藏隨緣成立有二義起信論云一者心真如門二者心生滅門是二種門皆名總攝一切法心生滅者依如來藏故有生滅心依所謂依不生不滅與生滅和合非一非異一切眾生平等一性俱是真如隨緣成立依他無性即圓成故一理齊平故說生界不減佛界不增如是義類廣多無盡故四頓教文二初立名四頓教者鈔由前小始終三教總名為漸今此中離言絕待對前漸教故名為頓以頓者不立漸次義故二釋文義二初釋名義總不出說法相唯辨真性一念不生即名為佛無漸次故說名為頓鈔一念不生即名為佛以觸處逢真無漸次義故立頓字名耳二釋教義五法三自性俱無八識二無我俱遣訶教勸離毀相泯心諸義類故鈔一名二相三妄想四正智五如如三自性者一徧計二依他三圓成即三自性也二無我一者人無我二者法無我訶教勸離者以達摩西來不立文字以心印心以法印法故五法三自性及八識二無我理一切俱掃以言語道斷故如是義類廣如楞伽金剛等經諸妙義故五圓教文二初立名五圓教者鈔由前以漸而立頓名以頓而立漸名以漸而立頓名者即小始終三教以是法不可示言辭相寂滅故是名為頓也以頓而立漸名者一切聖賢皆以無為法而有差別故名為漸也是以頓不礙漸即行布次第故漸不礙頓即觸處圓成故由是頓漸無礙得入圓宗故今第五立圓教名也二釋文義二初釋名義統該前四圓滿具足得名為圓也鈔統該前四者即小始終頓四義攝歸圓故如海百川以普同一味名圓滿具足也是以圓信圓解圓修圓行圓證以因該果海果徹因圓得名為圓義也二釋教義所說唯是無盡法界性海圓融緣起無礙相即相入帝網重重主伴交參無盡無盡故三結五教名義以上五教之義廣如華嚴玄談中辨恐煩不引鈔恐煩不引者指略在廣義有所陳二攝屬所歸文三初正屬所歸今此經者正屬于終兼通于頓義該小始二引證分三初證終教義文云如來者即諸法如義又云若見諸相非相即見如來又云如來者無所從來亦無所去故名如來等斯為事理圓融二諦無礙特顯中道即法華諸法實相之妙義也又云信心清淨即生實相攝終教義也二證頓教義又云離一切相即名諸佛即頓教毀相泯心之旨也又云以無我等四相修一切善即得阿耨菩提等亦頓教義也三證始教示顯性義又云可以三十二相觀如來不者斯借小乘心外有法以探尊者是該小教義也尊者領意即轉破云不可以三十二相觀如來者破相顯性即借始教之義也然此經者雖借小始二門之用攝歸終頓之源直指一乘無二法故三釋通妨難問何得不攝歸圓教答但屬圓教少分以不陳之故賢首大師判華嚴為圓教一乘有二義故一同教一乘二別一乘同教一乘者則同頓同終別教一乘者則不可思議今此經者即華嚴同教一乘所攝非別教一乘攝也三釋十二分文三初列名言十二分者一契經二應頌三授記四孤起五因緣六無問自說七本事八本生九方廣十未曾有十一譬喻十二論議二攝屬所歸今此經者以屬八分所攝此經既屬修多羅藏豈非契經所攝故尊者因請而說即因緣所攝故若以色見我及一切有為法等偈即孤起所攝故歌利王割截身體即本事所攝故如來為發大乘者說即方廣所攝故我從昔來所得慧眼未曾得聞如是之經即未曾有所攝故如夢幻泡影等即譬喻所攝故賓主往復問答即論議所攝故雖文中過去然燈授記及五百世作忍辱仙人俱屬本事所攝非授記及本生所攝故至於應頌文義全無故非所攝是以十二分中惟屬八分之所攝故三總結以上第二藏教分攝一科已竟
