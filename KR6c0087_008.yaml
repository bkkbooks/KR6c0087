body:
  text: 西天寺後學沙門性起述八誦持感應文三初總標第八誦持感應者次釋文二初列名其利有十一諸佛護念二衆聖弘讚三功超餘行四內施不及五外施無比六銷極重障七開佛知見八福利無邊九感應多端十常被天人供養二轉釋文十一諸佛護念第一諸佛護念者經云如來善護念諸菩薩善付囑諸菩薩然斯護念有二一如來住世四十九年雖説八萬四千法藏以一般若之法常自護念二如來滅度後乃至見者聞者廣生敬信受持讀誦分別解説無不歡喜普利無邊皆是如來護念此經感德力故二衆聖弘讚二初西竺讚傳二衆聖弘讚者謂無著大士將登地位上升見彌勒菩薩傳授金剛般若宗旨八十行偈親口解釋二十八祖龍樹馬鳴諸大士等亦弘般若以為修福之本二此土弘闡此土五祖廣勸人持誦此經即能見性成佛故六祖聞之豁然省悟諸佛宗匠盡入此門弘闡敷揚讚莫能盡夫彌勒是補處之佛尚以宏傳況餘者乎三功超餘行二初得法超勝三功超餘行者設有大士經無量劫行諸度行如捨身命布施等若菩薩知一切法無我得成于忍此菩薩前勝菩薩所得功德不化可思議二供行不及經云我念過去無量阿僧祇劫於燃燈佛前得值八百四千萬億那由他諸佛悉皆供養承事無空過者若復有人受持般若一行於我所供養諸佛功德乃至算數譬喻所不能及解曰供佛之行尚不及況餘行乎四內施不及二初每日施行劣四內施不及者經云若有人初日分以恆河沙等身布施中分後日以恆河沙等布施如是無量百千萬億劫以身布施次持般若行勝若復有人聞此經典信心不逆其福勝彼何況書寫受持讀誦為人解説豈可思議福德較量者哉五外施無比二初外施無及五外施無比者經云如恆河中所有沙數如是沙等恆河大千世界七寶以用布施次持行福勝若復有人於此經中乃至受持四句等為他人説而此福德勝前福六銷極重障六銷極重障者若人多生纍劫罪障深重故能於現生中他緣迫逼障於道法不得熏修異熟報障實難除滅今持般若盡淨無餘如教啓十因中辨七開佛知見三初聞信得法七開佛知見者經云若復有人得聞是經信心清淨即生實相當知是人成就第一希有功德夫實相者是諸佛心印惟佛與佛乃能究竟二諸聖莫測法華云不退諸菩薩其數如恆沙一心共思求亦復不能知除諸菩薩衆信力堅固者三結歸本經是知法華以實相為開示悟入之本今此經者以一念淨信即生實相豈非開佛知見者乎八福利無邊二初無住行勝八福利無邊者經云由菩薩知般若以無住相布施其福德不可思議十方虗空尚不能喻況比餘法之類而能及哉次結歸本旨解曰若不受持此經何能了無住相布施者乎九感應多端二初總讚普益九感應多端者夫以般若之法如摩尼寶珠能滿一切諸所求者故利濟無邊益施無盡二別讚弘濟或以解冤而釋結唐武德年間長安蘇仁恃富不知罪福過分宰殺及餘重過忽染疾見二使押見閻羅汝生前修福以至今富汝今恣意殺生減算絶祿令獄卒驅至刀山仁即憚怖云仁生前曾請書金剛經一卷送安國寺神敬僧受持此僧遷化豈無報應言未竟見神敬手持金剛經即作證驗願王放赦王即允從回陽增壽印施此經千卷修水陸大齋施田百畝敬供三寶或以脫苦而超升隋沙門名法藏稟性精嚴于洛州縣募衆建寺又寫經八百卷謂法藏曰汝造寺寫經有互用之罪我今勸汝誦金剛經可消此罪俄而疾愈馨賣衣鉢書寫此經令人受持壽至九十端坐而化云生西矣或以讀誦而延命如琰法師聞相師云難過十九歲大驚即回誦金剛經後壽至九十歲而終或以了道而無生宋時有王氏女常念金剛經懷孕二十八月憂産之患偶見僧勸印施金剛經千卷王氏遂依即生二男壽至六十無疾而終見二使引閻羅命坐誦經畢王曰何不誦補缺真言曰世聞無本王即示呪曰崦呼嚧呼嚧社曳穆契莎訶一回向真如實際心心契合二回向佛果菩提念念圓滿三回向法界一切衆生同生淨土王誦畢即使送回汝再壽終即得生淨土此間不復來矣故云了道而無生也或以講念而消毒昔南嶽思大師深達般若善通佛慧所得妙旨無不窮源是以廣化者多當時諸大論師生忌妬即將毒藥暗藏食內供養師飲後乃有痛患因念般若法力解化未罹其患或以稱名而退敵昔帝釋天尊被修羅爭權天帝即升善法堂念般若力而即退散感應萬殊止非一二現載典章俱有名舉良以無為妙果菩提尚以成就況人天小果之應者哉十常被供養文三初指諸果同本十常被天人供養者夫一切佛者以法為師若無其法何能成就六度妙行及法報化三身者乎故一切佛及諸佛阿耨菩提皆從此經出故是以有法即有佛有佛即有僧法身無二一體同觀佛雖去世法身常住若無般若經卷何能知法身常住乎故信受弟子即信受佛真法身今持般若之行即修諸佛之妙行既修諸佛之妙行必證妙行之果應知始終一貫因果無二者無非般若法也二指全身舍利故在在則天人供養時時則舍利分彰經云若有隨説此經乃至四句偈等當知一切世間天人阿修羅等皆應供養如佛塔廟何況有人盡能受持讀誦當知是人成就第一希有之法若是經典所在之處即有佛故三問答斷疑二初問答問法華是諸法中王此經亦是諸法中主何得此經更為尊妙答法華為開權顯實會三歸一俾令三乘俱稟受記作佛若無般若之法佛道何修妙果何證是以法華委付家財皆以般若玄宗而為其本二結歎諸法中王應知法華既為諸法中王此經亦為諸經中王佛親證之菩薩修之佛佛道同惟此一法者耳三結大科以上第八諸持感應一科已竟
