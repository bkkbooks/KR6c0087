body:
  text: 勅建西天寺武林後學沙門性起述三開章釋文分二初列名一教啟因緣二藏教分攝三會通餘部四乘所被機五教體淺深六宗趣通局七處會傳譯八誦持感應二釋義列科為八且初科中分二初總標列初教啟因緣者二一總因緣二別因緣鈔教者聖人被下之辭啟者啟一經之總源因者眾生本有佛性為因緣者佛出世指示為緣謂佛因此由此而為緣故者者牒定之辭後之下文而釋之也二轉釋又二初總因緣分二初標總題言總因緣者二釋部緣文又三初喻申自利夫王道坦坦千古同歸一乘玄門諸佛齊證鈔千王大道坦坦平平經千古而不易也佛佛道同垂永劫之常恒豈有異哉故法華經云十方佛土中唯有一乘法無二亦無三除佛方便說儒云莫不由斯道也斯之謂歟二證明利他故一切諸佛為一大事因緣故出現于世所謂開示悟入佛之知見故佛知見者即般若波羅蜜多智慧光明普令一切眾生盡入無餘大涅槃故鈔法華經中佛告舍利弗云諸佛世尊唯以一大事因緣故出現於世舍利弗云何唯以一大事因緣所以諸佛世尊欲令眾生開佛知見示佛知見悟佛知見使得清淨故出現于世由佛昔因願力故感果得周圓普令眾生開示悟入盡得無餘大涅槃故涅槃者此云圓寂亦云滅度所謂以般若智慧光明斷除煩惱障及所知障滅度而滅度之斯為佛之本意本懷豈有他哉三結大事因緣良以一切眾生本具佛性故君子以人治人改而止豈同執柯伐柯猶以為遠哉鈔由上佛智破除一切眾生迷闇令入大滅度者良由眾生本來具有天然自性真知真見不假修為而成就也只因眾生逐妄迷真不見自性故諸佛出世指示悟入而為緣也故君子以人治人下人皆可以為堯舜耳二別因分三初標數二別因有十二轉釋分十初諸佛護念三初標一為諸佛常以般若護念諸菩薩故二釋夫以般若之法佛佛道同如王寶印一同護念是以諸佛證之菩薩脩之眾生仰之仰之者則頓超劫海脩之者則諸佛護念乃至付之囑之無非此一般若波羅密多之法也鈔般若之法是佛心印如千王寶印一同護念是謂永護憶念此般若之法也由是諸佛證之以為果德菩薩脩之以為妙行妙行者即十波羅之妙行而證諸佛之果德也至於眾生一念淨信圓覺妙心豁然開悟頓忘人法解真空故是以彈指合掌頓超劫海修習之者果人護念乃至付小菩薩囑大菩薩諄諄切切饒舌叮嚀無非皆為此般若心印之法也三結是以世尊拈花迦葉微笑至於歷代諸祖轉展護念轉展付囑者無非惟此一事而已矣是以者承前契後之詞世尊在靈山會上談經三百餘會說法四十九年至後涅槃會上世尊拈花百萬人天大眾無不茫然世尊告云我以無相為相無門為門涅槃妙心付囑摩訶迦葉是後轉付阿難以至達摩西來而為此方初祖轉囑神光至于六祖會下出於青原南嶽青原流于曹洞南嶽派于臨濟及我本師天濤雲老人等共為七十三世無非以心印心以法印法惟此一事實餘二則非真矣二教示降伏分三初標二為令大士降伏其心悟真空故二釋謂佛直示真元掃除我法二執了一切眾生即涅槃相無生可度鈔八識規矩云我執二種法執二種我執二者一俱生我執謂於五陰等法中強立主宰妄立為我與身俱生故二分別我執謂於計我法中分別我能行善我能行惡而起執故二法執二者一俱生法執者謂無始時來虗妄熏習於一切法妄生執著恒與身俱故二分別法執者謂於邪師及熏邪教分別計度執為實故分別二執粗故易斷細故難斷今佛直示真知頓令大根眾生開示悟入了達一切異生即涅槃相無生可度故淨名訶慈氏云彌勒如眾生亦如何有眾生而可化者不起度生之見即得破除俱生我執俱生法執頓斷諸障頓證真如圓滿菩提歸無所得是為降伏其心故三示顛倒若起度生之見我人眾生壽者即非菩薩故鈔若有四相非大士者反顯不能降伏其心故三示無住法分四一標三為令了無住法是菩薩故二釋謂一切妙行如空中鳥跡不住此岸不住彼岸不住中流運無住法而為其本鈔一切妙行者即十地所修十波羅密之妙行也謂此諸妙行若空中鳥跡似空中風相難說難可示如是十地義心意不能了又云非初非終後非言詞所說出過于三世其相如虗空寂滅佛所行言說莫能及地行亦如是難說難可示不住此岸下法界品中大願力精進救護一切眾生主夜神告善財云菩薩法者譬如船師不住此岸不住彼岸不住中流運無住法而為其本維摩經中文殊問淨名云菩薩以何為本答以無住為本又云菩薩以從無住本立一切法故三引證分二初證無住因行故下文云菩薩行六度等應無所住而生其心又云若心有住則為非住鈔大士行施度等不住色聲香味觸法心故古德云見色非干色聞聲不是聲山河及大地全露法王身由是不住有為不住無為亦不住非有為非無為是故菩薩不住相想而行施等諸度是福德即非福德性故又云若心有住則為非住佛道矣二證無住果行又云菩薩知一切法無我得成于忍此菩薩勝前菩薩所作功德不可思議鈔知一切法無我者以般若智圓照自性破除我法二執了真空故得成于忍者坐斷能所現量分斷俱生無明分證十地真如即得頓超伏忍信忍順忍以至漸入無生法忍寂滅忍故此菩薩者即超忍諸菩薩也勝前菩薩所作功德不可思議者謂勝地前初心菩薩不能忘取相有漏心而行施等諸度也今此地上菩薩超通達位時乃至無有少法可得故云凡所作功德皆無漏行不取性相任放天心忘緣等照而行施度等者由斯妙行故不可思議云耳四結歸無住是以勸令一切大士了無我法得成于忍能忍第一諦證無住法故四示般若是諸法本分三初標四為令知般若是諸法本故二釋謂般若之法乃諸法中王是以六度四等塵沙妙行皆以般若而為其本若無般若朗徹心源一切行門成有漏故鈔般若法即實相心印之法也是以施等諸度慈悲喜捨乃至無量塵沙行門皆以般若心印實相而為其本此般若法或名真如或名法性或名本圓覺藏或名常住真心或名實際本來是知百千之名皆不出乎實相心印之法體也故諸大乘經皆以實相為本三藏十二分皆以實相為源故下文云若眾生信心清淨即生實相生實相者即生十地真如實相故由得真如實相般若方修一切妙行得成真如無漏行故若無下反顯之文謂若無般若慧光朗徹自性知一切法了無我者即所修一切施等行門成有漏也三引證下文云一切諸佛及諸佛阿耨多羅三藐三菩提皆從此經出故鈔斯顯果人及所證之法皆從般若心印而流出故圓覺經云善男子無上法王有大陀羅尼名為圓覺流出一切清淨真如菩提涅槃及波羅密教授菩薩一切如來本起因地皆依圓照清淨覺相永斷無明方成佛道故云是諸法中王故五直示真如離相分三初標五為直示般若心印無迂曲故二釋謂般若之法直示真如無二法故所以色空非有妙性恒然鈔般若法者即真如心印法也夫心印法者非色非空虗相本盡真性本現是故此真如法從本以來離言說相離名字相離心緣相畢竟平等無有變異不可破壞唯是一心故名真如三引證下文云離一切相即名諸佛又云如來者即諸法如義惟此一事實餘二則非真故六為被最上機分三初標六為被最上一乘機故二釋謂般若之法原非下劣根機可能承受鈔根有三根機有五性今所被者最上乘故非圓頓機莫能入也問三根普潤大小兼収方為此法之圓妙耳云何獨被大機而不被小機者耶答前不云乎諸大乘經及三乘之法皆以實相為本今不被小而云被大者有三義一者引未發大心者令發大心故二者已發大心者令永安住不退轉故三者令彼二乘生大慚愧入佛智故故云如來為發大乘等說由斯巧語令彼小乘深信大乘二空真如更進窮樓回心向大非實棄不被耳三引證分二初獨被上機故下文云如來為發大乘者說為發最上乘者說二激引小機又云若樂小法者著我人等即不能聽受讀誦為人解說荷擔如來阿耨多羅三藐三菩提鈔樂小法者只樂生空不解二空以不知心外無法不達五蘊六入十二處十八界本來空寂無我無人無眾生無壽者未脫法執見故是以不能聽聞不能受持不能讀誦亦不能利他為人分別解說荷擔無上大菩提故七為示見性必脩分三初標七為令見性必脩故二釋謂若不持戒脩福於此章句雖復受持讀誦終無利益如畵餅充饑之類反此必要持戒脩福於此章句能生信心即生實相鈔夫修證即不無染污即不得故大事未明如喪考妣大事已明還要如喪考妣是知見性已後必假修而證之若不修行曠劫無明云何能斷故楞嚴云雖復受持讀誦若不斷除殺盜淫妄如蒸沙作飯必無實果又蓮池老人云畵餅何益於饑腸燕石難瞞于賈價是故必要因戒生定因定發慧是為如來三無漏學決定清淨明誨故曰必要持戒修福於此章句能生信心即生實相持戒者戒也修福者定也生信心者慧也即諸位之堦基耳生實相即生諸地之實相也所謂斷十障證十如故三引證故下文云以無我無人無眾生無壽者修一切善法即得阿耨菩提鈔以無我人下即見道分也修一切善法者即修道分也即得阿耨菩提者證道分也八示全修即性分三初標八為令知全修即性故二釋謂令一切菩薩了達六度萬行無非般若妙行以一切行門全修即性無二行故鈔全修即性者即真如一行三昧法也由真如一行三昧力故得入無量諸三昧門故得了六度而即一心悟萬行而即一體故云無二法故三引證下文云若人發阿耨菩提心者當生如是心我應滅度一切眾生滅度一切眾生已而無有一眾生實滅度者通達無我法行如來說名真菩薩故鈔了悟自性生佛一如我及眾生本來寂滅奚有我能度眾生我能修行者乎故云通達無我行者始知全修即性如來說名真大士故九示銷重障分三初標九為令多障菩薩銷重障故二釋謂設有菩薩雖發大心經多累劫重障難除故令持般若法轉重障而成輕障破煩惱障及所知障故鈔雖發大心下凡情未斷般若未飡雖經累劫修行施度等行未超三界分段生死未得斷除現行煩惱一切重障故勸持誦般若大乘之力方銷分段煩惱極重報障故普賢章云若欲懺悔者端坐念實相是故宜至心懺悔六根情即持誦大乘義轉重障而成輕障故重障者即貪嗔癡等煩惱障及報障也輕障者所知障也由持般若力故先破分別二執現行煩惱後破所知障所謂般若止觀力強俱生隨眠無不斷也三引證下文云是人先世罪業應墮惡道以今世人輕賤故先世罪業即為消滅當得阿耨多羅三藐三菩提故鈔先世罪業者業兼煩惱障也墮惡道者報障也由持般若性力消生前之罪因滅當來之報障故受世人輕賤免重業而成輕受銷重報而成輕報也故淨業障經云若有菩薩先世造一切罪因果未熟恐受當報或于現生依教修行持誦大乘反受重疾難堪難忍或招顛沛乃至一日一夜者能消無間地獄一切重罪況多日乎當得下正是斷二障證二果故十斷疑生信分三初標十為令斷般若諸疑現行及種子故二釋分三初因信得入謂疑為障萬善之門不疑為信成菩提之進步故能從聞思修入三摩地證般若波羅密等妙法門故鈔華嚴云信為無上菩提本信能必到如來地故佛法大海信為能入故知疑為大障聖道不疑脫煩惱怨無施多力由是應知從聞思修入於妙舍摩他三摩禪那止觀二門若一生疑永無絕分設或修之半塗退墮故聞慧中起步斷疑淨信忍可決擇分明至果菩提永不退轉證入金剛心印十地門故由是弘法大士總以斷疑生信絕相超宗八個字等為此經之大綱也二指聞本法斷疑故下須菩提節節詳明細問於佛令破諸疑種子及現行故若文中尊者未問於佛佛即就遮未起之疑名為種子若尊者已問於佛佛即破之是為現行三斷疑章句所以分二一證古今謬是以世親大士以分二十七段疑文足為明鏡後學析之為三十二分非正意也鈔彌勒偈云調伏彼事中遠離取相心遠離能取所取想心見故及斷種種疑種種疑者即分二十七段疑也亦防生成心謂尊者已問佛即就遮破之為現行疑若尊者未問佛即就遮發揮斷疑之旨早破尊者疑使令不起故云亦防生成心耳故世親依斯妙偈後文兩句之義列于二十七段疑文謂之金剛釋疑論發揮本經略意之旨其中還有微細斷疑之意總該在內俾令來學明如指掌易通佛意後之昭明太子以將此經列成三十二分用古正今實為破碎斷疑文意二傍求未古更復傍求異解理現雖明未遵古意鈔或緇或素或高士等廣依三十二分科文解釋時人謂之文直義明了無迂曲故今釋之曰不然斯諸文釋理觀雖妙實為傍求異解而與彌勒世親古釋之論似有違也問既諸家古德依三十二分之文註釋亦能發明理觀意旨奚得局立斷疑之文以為美哉答夫彌勒是補處佛位證圓覺深通佛意為法王嫡子金口所宣八十行偈解釋斯經授之無著無著又將此偈轉授世親世親又依斯妙偈列成二十七段斷疑論文解釋斯經後之高賢凡欲銷釋總依此論方不謬佛意乃萬古之規鏡也若依三十二分之文註釋總然玄妙未遵古意云耳三結歎良以古意諸疑謂障道之首生信為入道之源故知斷疑生信乃得絕相超宗令入般若波羅密等諸忍果故鈔諸忍者在無住文中前已釋故三結別因之緣分二初結別因以上教啟十因已竟鈔由上十種別因乃宣此經之法故下總結此經之緣以避煩耳二總彰別緣雖未若華嚴教啟之緣其中時方說主入堪托鉢歸來趺坐洗足収衣眾成就等聽法雲集願樂欲聞者即此經之緣也鈔華嚴玄談先明十因次明十緣然此經文略未便廣引十緣之語故大槩宣說之十緣者一依時二依處三依主四依三昧五現相六依說者七依聽者八依德本九依請者十依加者文雖少而義周思之可也
