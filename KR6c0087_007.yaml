body:
  text: 敕建西天寺武林後學沙門性起述七處會傳譯三初標第七處會傳譯者二釋文二初明佛說二初中又三初標處會初總明佛說者大部六百卷文四處十六會二詳處會王舍城鷲峰山七會山中三會山頂四會二給孤獨園七會三他化自在天摩尼寶藏殿一會四王舍城白鷺池邊一會三指本經處會此經則給孤獨處第九會乃第五百七十七卷之本鈔以上明佛說已竟次明傳譯何時二初指諸佛傳譯後別明傳譯此經卷者時主前後六譯一後秦羅什鈔鳩摩羅什者梵語此云童壽祖印度人文以聰敏見稱母是龜茲王妹母孕什時增益慧辨七歲出家日誦千偈義旨通至九歲與外道論義辨挫邪風咸皆愧伏年十二歲有羅漢奇之謂母曰常守護之若年三十五歲不破戒律當大興佛法度無數人師又習五明論四韋䭾典陰陽星算必窮其妙後轉習大乘數破外道遠近諸國咸謂神異母生什後亦即出家聰拔衆尼得第三果什既受具母謂什曰方等深教應闡秦都於汝無益何如什曰菩薩之行利物亡軀大化必行爐鑊無恨母即告曰汝立誓宏吾不與止什自是已後廣習大乘必洞其奧西域諸王請什講說必長跪座側命什踏登苻堅建元九年太史奏云有德星現於外國當有大德智人入輔中國堅曰朕聞西域有羅什襄陽有道安將非此耶後遣呂光統領七萬雄兵西伐龜茲王不能捨什曰為我一人傷害衆多吾不能忍王只得含淚而送什雖同呂光進國呂見師幼少生慢因什善卜數類應呂又用之呂立創西凉為主亦請什留至姚秦宏始三年興滅西呂方入長安秦主興加厚禮之敬入西明閣及逍遙園別館安置數僧等八百沙門咨受什旨又于草堂寺共三千僧衆手執舊經本而參定之莫不精究洞明深旨時有僧睿覲什故什所譯經睿並參正二後魏菩提流支鈔此云覺希北印度人遍通三藏妙入總持志在宏法廣流視聽魏宣武帝洛陽翻譯此經在內三陳朝真諦鈔梵語波羅末陀此云真諦西印度優禪尼國人景行澄明器宇清寧藝術異解編素諳練梁武泰清於寶雲殿屬侯景紛紀乃適豫章始興南康等雖復恓惶譯業無輟即泛泊西歸業風賦命飄還康州住制止寺翻譯訖陳恭建譯五十部今經亦在其數四陳朝達摩笈多鈔隋言法密南賢豆國人開皇十年來屆見文帝請入京寺義理允正稱經微旨然而慈恕立身恭和成性心非道外行在說前戒地夷而淨定水幽而潔經洞字原論探聲意至煬帝定鼎東都置翻譯館而有金剛文義在耳五唐初玄弉鈔師是河南洛陽人俗姓陳氏頴川仲弓之後出家遍探諸藏皆有錯誤常慨教缺傳匠理翳譯人遂使如意之寶不全雪山之偈猶半於是裸足涉履險若平夷既戾梵境等咨無倦五明四含之典三十二之筌盡搜其微究其妙法師討經論一十七周遊覽百有餘國貞觀十九年回歸上京敕宏福寺翻譯已上多出靜邁法師譯經圖記六大周義淨未曾詳出另閲別章已上六人皆三藏鈔三藏表德法師舉名由德而顯故彰其名所以莊生云名者實之賓德者名之主若無其德苟有其名故夫為人師者不可以無德而虗當其名若虗當者則損其福耳況未通經旨者乎今云三藏者即通習經律論三藏達無相法住於佛住兼修自利利他而為三乘人則以法為師也即前之六師耳又六師各有其諱而為之別三藏等四字而為之通是為通別德而彰顯也二指本經傳譯釋主二初傳譯主今所傳者即羅什宏始四年於長安草堂寺所譯二釋論主文二初補主傳釋天竺有無著大士入光定上升兜率親見彌勒稟受八十行偈鈔梵語彌勒此云慈氏以多生劫來恆修慈行而得慈心三昧之定故云慈氏佛世時降生西天婆羅門種輔揚大化影彰佛會現為釋迦法王之子處補當來之記已入賢劫千佛中第五尊龍華教主度無量衆廣如下生經說今現在兜率天宮內院教化諸天及菩薩衆因無著大士欲習大乘真理未諳深求的旨悲嘆本師涅槃心意思惟幸喜彌勒補處大師而在天宮即入日光定力上升見彌勒大士親傳八十行偈金口解釋通卷要旨可知此經乃佛心印耳二論主轉授又將此偈轉授世親世親又將偈作長行解釋成三卷論約斷疑執以釋無著又造兩卷之論約行位以釋鈔世親無著本係親仲因世親專習小乘無著專習大乘無著未證果時習學大乘根鈍未悟欲尋短見因有他方羅漢而化度之雖入小乘果證心本大乘之種還求大乘二空真知因見彌勒後方悟入無著因見親弟不好大乘專習小者毀剝大乘故無著見弟來見告云吾之病也為爾所害爾專讚小乘毀說大乘必墮苦處是吾憂也今吾所未閲之大乘餘典吾未觀者爾代吾閲親即生大慚愧速閲華嚴大乘等教又觀彌勒金剛偈頌畢即向兄求懺曰可將利劍割吾舌根吾不欲命矣兄即止曰汝不可為也如人從地跌倒還從地起先言毀說大乘之錯今可將舌根轉讚大乘即懺過愆而復其功也故世親依斯妙偈裂成二十七段疑文窮幽妙旨無不明矣無著謂此經發揮諸地位中真如意旨故約十八行位而釋之也二結歎釋論二主是知古今解釋者若不遵無著世親二大士者俱是傍求異解未合聖意耳鈔決不可易古就今總然玄妙無非後撰之己見耳故云未合聖意也三結以上處會傳譯一科已竟
