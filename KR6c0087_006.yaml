body:
  text: 敕建西天寺武林後學沙門性起述六宗趣通局文三初標列第六宗趣通局者夫語之所尚曰宗宗之所歸曰趣鈔宗者崇也故云所尚亦云尊也尊者主也宗歸曰趣趣者趨也以吾人之所趨向故清涼云亡軀得其死所竭思有其所歸故曰不論是何等法門乃我之所崇即我之所尊而為歸向趣故故佛一代時教總以因緣為宗趣耳故舍利弗習外道時路遇馬勝比邱問曰汝師以何為宗答曰以因緣為宗又復問之尊者即答偈曰諸法從緣生諸法從緣滅我佛大沙門常作如是説又中論云空假中三觀總以因緣而為宗主趣向義故故論云因緣所生法我説即是空亦名為假名亦名中道義即以因緣為宗以空假中三觀為趣所謂一空一切空一假一切假一中一切中故二開列章文四初標列名教先明其通後明其別二轉釋名義分十一我法俱有宗二初列名第一我法俱有宗謂犢子等部或少一分鈔夫論一代聖教不出十宗大意其中前四俱屬小乘次五六二宗通大小乘後四宗惟一乘又前六宗通十八部并上座部及大衆部今初上座部中如來涅槃三百年後轉名説一切有部又三百年後從一切有部流出犢子部次又三百年後從犢子部流出四部一名法上部二名賢胄部三名正量部四密林山部後次第三百年後還從一切有部流出化地部又一百年後從化地部出二部一名本末經部一名法藏部次又三百年後出飲光部次又四年後出雪山部今上座部轉名説一切有部為本分二類各五為末本末合成十一部因上座部轉名一切有部流出十部皆從如來滅度一千四百零四年中而流出故二大衆部中分八部次如來二百年出第一名一説部次又二百年出第二名説出世部次又二百年後第三名雞胤部四名多聞部五説假部六名多山部七名西山部八名北山部又大衆部為本八部為末是為兩次本末合成名義為二十部今我清涼祖意將本末十八部及二部中義旨判分六宗屬大小乘故故文殊大士問經云十八及本二皆從大乘出無是亦無非我説未來起故佛住世時文殊即記當來之事疏或少一分者謂犢子部等五部俱計我法而立宗故向下第二科中詳釋今云等者等取根本經部不等取末經部根本經部者原從説一切有部流出又從化地部中一百年後流出末經部又將根本經部并末經部合成一部名本末經部故單等取本經部義即本末經部中一半耳故疏云或少一分二立我法俱有宗所以三初正彼計立二初立三聚彼立三聚一有為二無為三非二聚非二即我鈔一有為聚二無為聚三非有為非無為聚大意掃除二邊非有非無處計立為我次立五法藏又立五法藏謂三世過去現在未來為三無為為四第五不可説藏我在其中以不可説有為及無為故是為三聚五法藏者鈔初標次釋後結謂有無二為遍三世故又此有無二為在三世中不可得故彼宗以不可得中計立為我二立我所以大意為雙遣有為及無為故云不可説等離二邊故立為我意鈔大意下立我所以因雙遣有無離二邊故不可説也以不可説中而有我意三出彼宗過然此一部諸部論師共推不受呼為附佛法外道所計雖殊皆立我故鈔然此一部下破也謂西天九十五種十一師等因計有我故成外道而佛法中佛説一代聖教皆破有我故計立我者是生死根本云何今佛法中而立我者豈非是附佛法中之外道乎疏所計雖殊皆立我故者正出彼過意皆遍犢子等五部義故二法有我無宗二初出部名二法有我無宗謂薩多部等鈔薩多婆等者即説一切有部二雪山部即是上座本部宗輪出論中義又多同説一切有部故亦等取上座部也三多聞部宗輪出其中餘義多同一切有部並不立我計法實有故是三全部而言等者等取化地部末計少分耳二立法有我無宗所以三初正彼立宗彼立諸法不離色心或立三世無為或分五類皆無有我以無我故異外道計鈔彼立諸法即五蘊六入十二處十八界等不離色心二法於色心等法各各推求誰為我者誰為主者即忽然而得生空觀也及無為自性尚不可得何處而立我者故云實無有法也或立三世無為者即化地中少分義云過去未來並皆實有亦有中一切法所知所識各無自性故名一切法無我疏或分五類即上三世及無為法不可説藏前立有我今不計我了無我故故疏云以無我故異外道計所以勝前宗部不立我也二出無我除過二初立因緣正破又於有為之中立正因緣以破外道邪因及無因故鈔於有為中立正因緣者佛於大小乘教不離因緣言因緣者即一切有為色心等法也故圭峯大師云夫因緣者有二一內二外外因緣者謂水土人時而芽得生泥團輪繩水火陶師而器得成內因緣者外由內變本末相收為一緣起故佛教從淺至深説一切法不出因緣二字然有四重一因緣故故生死成壞涅槃云我觀諸行無常云何知耶以因緣故二因緣故即空謂不自生若自生者種子不因他力而成故不他生若他生者何待種子而生不共生若共生者即自他多果過之生不無因生若無因云何成立一切果也三因緣故即假如鏡像水月之流緣會不得不現四因緣故即中若言不從因緣生即是定有定無墮斷常見故中論云因緣所生法我説即是空亦名為假名亦名中道義是以立正因緣以破外道邪因無因所謂自然為因能生萬物即是邪因謂此五穀不因他力而成就故又人不修而自成故所謂無因者即謂萬物自然初生如鶴之白如烏之黑即是無因故妄計虗空微塵性等而以無因為生無因為果若計自然及無因生乃成大過豈人不教而自善也次計邪無二因為本然西域九十五種外道或是邪因或是無因等而為世間及涅槃體鈔西域九十五種不出十一論師所云外道者心遊道外以不了自性妄計自然無因而為世出世間本故名外道今出其名令學者不可不知一數論師計冥初生即二十五諦法數從冥諦而生名數論師如華嚴玄談中説二衛世師計六句和合六句者一實二德三業四大有五同異六和合為六句義耳三塗灰師計自在天生萬物四圍陀師計那羅延天生四姓五茶論師計本際生六時敬師計物從時生七方論師計方生人人生天地八路伽師計色心二法皆極微作九目力師計虗空為萬物因十宿作論師計苦樂隨業生十一兼因師計自在天生三引疏正破清涼云以不知三界由吾自心從癡有愛流轉無窮迷正因緣故異計紛然安知因緣性空妙有中百等論亦廣破之鈔以不知三界下引清涼大疏破無因及邪因故謂不知欲界色界及無色界皆從自心中流出動業即欲界有漏善惡而成就故也不動業即修有漏禪定而成就不動業現行熏入第八識心中成種為因而招當報有漏三界欲界色界無色界異熱之果故唯識頌云無始時來界一切法等依由此有諸趣及涅槃證得解曰界者因也謂無始時來一類相續種子而生現行成一切法等由此而有三善三惡趣道異熱果故及修戒定慧等而證得涅槃世出世間果也豈同外道或以邪因及無因等迷正因緣異計紛然者乎故云不知云云耳三結破是知佛法之淺淺已破外道之深深鈔小乘論中立生滅因緣之旨尚以破之況終頓圓三教之旨而不破哉三法無來去宗二初出部名三法無來去宗謂大衆部等鈔出部名者一大衆部三雞胤部四制多山部五西山部六北山部七法藏部八飲光部今云大衆部等者等下六部半義故所云半者又等取化地部中一少分耳二立彼宗義所以説有現在及無為耳其過未之法體用俱無四現通假實宗二初出部名四現通假實宗謂説假部等鈔一全分一少分一全即説假部一少分即末經部其成實論師先是數論弟子以所造為能造後出家時入佛法中即經部攝故二立彼宗意謂就前現在之中法在蘊為實在界為假其成實論經師即斯類故鈔現在法者即真俗二諦不離假實蘊門明義是實實者積聚故界處門者明義是假假者體假積聚故其成實論者即少分末經部義五俗妄真實宗二初出部名五俗妄真實宗即出世部等次立彼宗意謂世俗是假以虗妄故出世是真非虗妄故六諸法但名宗二初出部名六諸法但名宗謂一説部等次立彼宗意云一切我法但有假名無有實體故鈔中論云若有世間即有出世間既無世間何用出世間等故出世間亦假名耳無實體故以上六宗通大小乘故七三性空有宗七三性空有宗謂遍計是空依他圓成是有鈔三性空有下遍計虗妄是空觀依他是假觀圓成是中觀又遍計情有理無依他相有性無圓成理有情無又遍計純相圓成純性斯即法相宗義若約法性宗義了妄即真以相即性故八真空絶相宗八真空絶相宗謂心境兩忘直顯體故鈔法無相想思則亂生故不隨智見離心境故坐斷有無超現量故觸處逢真照體獨立故九空有無礙宗九空有無礙宗謂互融雙絶而不礙兩存真如隨緣具恆沙德故鈔九空有無礙宗下立雙遮雙照方成德性宗義互融者謂有即是即空之有空即是即有之空語空必攝於有語有必攝於空故曰互融言雙絶者有即空故有絶空即有故空絶言不礙兩存者不壞空有相故有即空而不泯空即有而不忘真如隨緣具恆沙德者由有不礙於空空不礙於有空有無礙離即離非雙照雙遮是為真俗圓融性相如如不二而二二而不二名不可思議德也故香林大祖和尚云一色無邊際紅蓮到處開分明離取捨那更有安排端的無餘事香風時送來又溈山師云聞聲見色蓋是尋常這邊那邊應用不缺即空有無礙圓宗之旨耳十圓融具德宗十圓融具德宗謂事事無礙主伴具足無盡無盡自在故以後後之旨深於前前故鈔圓融具德者謂一為無量無量為一一地即攝一切諸地功德此有四句一一即一切二一切即一三一即一四一切即一切又則一句中容有四句義旨如一切諸地如是乃至無量依正凡聖心境法門莫不皆然耳故名圓融具德自在宗義三料揀前四唯小乘五六通大小後四唯大七即法相宗八即無相宗後二宗即法性宗又七即始教八即頓教九即終教十即是圓教四攝其所歸二初攝屬諸宗二初有該無屬今此經者謂前六宗但有所該無其所屬即如破相顯性破相即妄顯性即真一切法等但有假名即該前故鈔經云佛問須菩提云可以三十二相見如來否不也世尊不可以三十二相得見如來等文非一斯諸文義皆以一切法等但有假名破相顯性故該前六宗文旨二正屬所該四初屬法相宗又此經除遍計性我法二執依他不有圓成不無即含法相宗義鈔經云凡所有相皆是虗妄即掃遍計性也又云若見諸相非相即依他性也即見如來等即圓成實性也其文非一故二屬法性宗又示三性遍計依他圓成三性三無性等即色即空即空即色故云是法平等無有高下是名阿耨菩提即終教宗如法華經中平等大慧教菩薩法故三屬頓教宗又即俗非真即真非俗非真非俗離性離相言語道斷心行處滅乃至無有少法可得是名阿耨菩提即頓教宗義鈔即俗非真者真不可得故即真非俗者俗不可得故是故真俗皆不可得則廓然無寄一念不生即名為佛是故不説法相惟辨真性等即頓教中義耳四攝屬圓宗後十圓融具德宗者雖未全攝亦少分攝故如前第五教體淺深中辨恐煩不引二本宗四初二師所立若依圭峰大師所判者以文字般若為宗以觀照實相為趣或以無住為宗以斷疑生信為趣鈔前是圭峰師立後宗泐大師立二和會二宗評曰以無住為宗即前圭峯義故謂住而不住即實相般若妙體常寂故不住而住即文字觀照般若不彰而自彰故三自評恐謬以豫之意以破相顯性為宗以觀照實相為趣文中有段段非相遮義故云破相又云即見如來等是顯性義又應作如是觀不取于相如如不動如來者即諸法如義是觀照實相而為其趣也四證後師不謬前旨今三宗評論無住之宗亦為正義經云以應無所住而生其心乃諸經之綱領三藏之本源故六祖聞之豁然大悟諸佛心印菩薩依止是以一即三三即一者無二法故三總結以上第六宗趣通局一科已竟
