body:
  text: 勅建西天寺武林後學沙門性起述三會通餘部三初標第三會通餘部者二釋文分六初通括大意既委此經已屬同教一乘然同教一乘乃諸經之綱領三藏之本源是以前後一貫始終無別應知教雖分五率本無殊從初華嚴次說阿含次說方等次唱般若玄宗而為其本二引經證成文六初引小乘論明法空故阿含論云無是老死即法空也無誰老死即生空也二引智論明法空又智論云三藏中明法空為大空摩訶衍中十方空為大空皆顯小乘已有二空又智論中云從初得道乃至涅槃常說般若鈔從始至終皆以般若而為其本故三引淨名明法空又淨名云觀身實相觀佛亦然鈔淨名云爾時世尊問維摩詰汝欲見如來為以何等觀如來耶維摩詰言如自觀身實相觀佛亦然我觀如來前際不來後際不去今則不住不觀色不觀色如不觀色性不觀受想行識不觀識如不觀識性等文斯取文義指觀五蘊身而即實相真如般若之妙理故四引本經明法空此經云信心清淨即生實相等是般若義故仁王亦說佛性名為般若五引般若明法空大品云欲得聲聞乘當學般若波羅蜜欲得緣覺乘當學般若波羅蜜欲得菩薩乘當學般若波羅蜜是以三獸度河各說清淺分河飲水自有千差故爾如來法隨機便則教有乘殊細推根源惟一法耳鈔大品云欲得聲聞下以般若智水而入三乘故是故下智得聲聞菩提中智得緣覺菩提上智得無上菩提是以三獸度河下一兔二鹿三馬以兔過河云水太深以鹿過河云水却好以馬過河云水太淺故云各說深淺分河飲水自有千差者云西竺有河名恒河如此方秦淮河之類謂各人門口飲水清濁不等味有差殊斯則二喻水喻般若水性無二機有深淺諍惡不同故爾如來法隨機便下合上二喻法及機宜云細推根源唯一法耳者言般若性水無二別也六引法華明法空經云十方佛土中惟有一乘法無二亦無三除佛方便說一乘法者即般若法也鈔引法華一乘實相而分別說三今直示本法無二亦無三故若有三說自隨他意語方便說也三釋通妨難二初問難問既惟般若一法何用初說華嚴終唱涅槃二釋通答難分二初從本起末答華嚴為直示最上大根眾生其奈中下未授故于一佛乘分別說三二攝末歸本循循善誘引入般若大乘空慧先所出納是子所知以至法華會上仍將般若空慧委付家財三乘俱稟授記作佛法王大寶自然而至攝末歸本流入薩婆若故是知法華若無般若之法將何付耶鈔循循善誘者即阿含時廣說天人因果小教以循循善誘引迷流而得入涅槃故二引入般若大乘空慧者即方等會上以談法相大乘故三先所出納是子所知者如來將般若空慧法財命須菩提迦葉富樓那等化諸菩薩故故曰是子所知四以至法華會上仍將般若空慧委付家財下雖法華授記作佛者以般若法而付囑之方能流入一切智故五是知下結歎云是知若無般若以心印心以法即法者決不能授記作佛耳四示般若流入諸法文五初指般若即法界義是以般若之法在華嚴為一真法界眾藝修之令入般若波羅密門鈔善財先近徧友一言不示表法男徧一切處故指歸眾藝童子唱四十二字陀羅尼門先阿後茶表示菩薩入四十二位賢聖真菩提路總依般若波羅密法門而修之故二指般若即實相義在諸大乘經為實相般若鈔如來一代時教皆依實相為本離此實相外無法可酬故三指般若即金剛性在此經為金剛般若鈔經云尊者問佛此經我等云何奉持佛告須菩提是經名為金剛般若波羅蜜以是名字汝當奉持所以者何佛說般若波羅蜜即非般若波羅蜜等四指般若即覺藏義在法華為本源覺藏覺藏者即般若義也鈔本源者即真如自性也覺藏者即般若智也是故起信論云從本以來自性滿足一切功德所謂自體有大智慧光明義故徧照法界義故真實知識義故自性清淨心義故常樂我淨義故清凉不變自在義故具足如是過於恒沙不離不斷不異不思議佛法乃至滿足無所少義故名為如來亦名如來法身論又問曰上說真如其體平等離一切相云何復說體有差別如是種種功德答曰雖實有此諸功德義而無差別之相等同一味唯一真如此義云何以無分別離分別相是故無二五指般若即涅槃性二初正示名目在涅槃為常住妙性亦般若義也二引經證成故世尊將入潛輝云我以摩訶般若之力徧觀三界諸山大海大地含生如是三界根本離性畢竟寂滅同虗空相等鈔大覺世尊將入涅槃時頓示三摩禪那三摩鉢底反復三次出定告眾云我以摩訶般若之力至同虗空相等者以示諸佛如來成道轉法輪入涅槃等皆以般若之力而成就故若無般若自性將何為本耶五名別義同是知名雖有異而妙旨無殊豈非般若而為諸法之本哉六賢聖同依故三賢之所依十地之所證十方三世諸佛皆依般若故得阿耨菩提者以一體同觀無二法故鈔般若既為三世諸佛之母豈以三賢十地而不依此法之所修哉故三賢為解行般若十地為修證般若諸佛為究竟般若是以從因至果無非般若性力而已矣三結以上第三會餘部文義一科已竟
