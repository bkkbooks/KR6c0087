body:
  text: 敕建西天寺武林後學沙門性起述五教禮文分三初標舉第五教體淺深者二開列章文五初結前生後二初是結前已知此經優劣之機普皆攝故次生後義未知何法而為教體二通括大意二初明道非言象夫道本忘言非言象而莫入法本無説非名句而奚窮二示法離名相是以無言之言以顯絶言之理無相之相以彰離相之源鈔法華經云是法不可示言辭相寂滅又云諸法從本來常自寂滅相佛子行道已來世得作佛此總顯無言之言無相之相以彰離言離相之源故三標列彰數今依遵古所判略分有十一音聲語言體二名句文身體三通取四法體四通攝所詮體五諸法顯義體六攝境唯心體七會緣入實體八事理無礙體九事事無礙體十海印炳現體四科揀優劣前四通小後六唯大又前七通三乘後三唯一乘五別列名釋二初合釋前三又二初雙標假實就前大小乘中通用四法一聲二名三句四文取捨不同各有三説二雙釋諸乘三初先釋小乘三一簡實非假一應作如是説語言為體其名句文者但顯佛教作用不能開示佛教自體鈔名詮自性句詮差別文者為名句二種所依故名句文等但顯佛教作用故説語言聲音為佛教體謂若無其聲云何能知名句文身作用差別之義故則定聲為體二揀假非實二云名等為體謂名句文身次第行列次第安布次第連合故聲但依于展轉因故謂語起名名能顯義定名為體舉名以攝句文三會通四法三者然俱舍意情無去取若取其雙存即合四法以為教體以上小乘中論鈔情無去取者謂前論師以聲為體後論師以名等為體俱有偏僻今俱舍論師以情無去取亦不單取其聲而去其名等故雙存兩用即合四法以為教體以上小乘中論者云結四法義在小乘次釋大乘假實文四初釋雙標意同今大乘中三意亦同前故二攝假從實一云攝假從實以聲為體離聲無別名句等故三攝實從假一云以體從用名等為體能詮諸法謂名詮自性句詮差別文即是字二所依故四釋假實雙用二初釋雙用三云聲名句文合為其體由前二説皆有理教為定量故鈔聲乃名等體名乃聲之用離聲名等不顯離名等聲要何用況又體不離用用不離體故體用雙彰以為教之定量故二引教義證成深密第四云不可捨于語言文字而能宣説淨名云以有聲音語言文字而作佛事此經云聞是章句乃至一念生淨信者既云聞者非聲豈能知章句乎三雙結定量良以因聲故有缺曲唇喉齒舌風息為緣故有名句語言文字由斯文字流傳後代方生意解生淨信故若缺其一何能成就是以定量四法皆為教體鈔良以因聲故有缺曲下謂佛之教體由假因緣而得生故由是故有語言文字流傳刊梓竹板記存永載令諸衆生見聞意解入佛智故若缺其一下謂缺其一法不能為佛教體奚得成就者乎是以定量四法下以大小三乘局定聲名句文通用四法而為教體第二向下七科次第列釋故通攝所詮仍歸第四名耳四攝所詮體文三初標四通攝所詮體者鈔由前局定聲名句文四法為教體者單屬能詮非屬所詮義所云詮者表也以表詮佛性妙理故聲名句文四法為能詮以能詮出諸妙義作用故諸佛妙義為所詮所詮真俗二諦令人心地開悟作用故以斯二法缺一不可也故若無所詮作用能詮文字則無用矣故第四有通攝所詮文義説也二釋文引證瑜伽八十一云謂契經體略有二種一文二義文是所依義是能依如是二種總名一切所知境界此明文義相成若不詮義教文何用鈔瑜伽下明文義二種缺一不可展轉互相依故大經云一即是多多即一文隨于義義隨文如是一切展轉成此不退人應為説此明教義相成下釋上缺一不可所以由無所詮妙義而斯語言文字則無用矣三結前義故知通所詮成契經體五諸法顯義文二初釋名第五諸法顯義體者鈔前中一文二義以為教體今此諸法顯義體中謂觸處成真得意忘所廓然無寄假如不得得意忘所之旨而諸文妙義盡屬知解宗徒反成障礙故知觸處明真而成教體者方得入法界矣況一切衆生機悟不同或得語言文字義而省悟者或以擊竹聞聲而省悟者或以觸身痛癢而省悟者是故楞嚴經中二十五圓通及古之聖賢莫不皆然也故第五門有諸法顯義體等説二釋文三一釋根塵為體謂一切諸法遍于根塵皆為教體鈔一切諸法者即六根六塵六識本是全體大法界心是以全體大法界心所以根根塵塵周遍法界觸處成真照體獨立而為教體故清涼云遇三毒而三德圓入一塵而心淨又華嚴云知一切法即心自性成就慧身不由他悟等其文非一問楞嚴云此方真教主清淨在音聞何得諸法以為教體答非語言文字未為教體此名句等者乃局一方之境耳若諸法顯義體者而通方大用普攝羣機乃為妙也二出諸法顯義所以三初示正義故知見色聞聲無非般若觸心了境本是真如鈔圭峰師云鏡心本淨像色原空由像色本來空故所以心本淨也故靈源禪師見桃花悟道云三十年來尋劍客幾回葉落又抽枝自從一見桃花後始信從前更不疑故曰觸心了境本是真如以為教體二引諸教證義四初淨土經證極樂國土水鳥樹林皆演妙法鈔引彌陀經證者有二一有情説法二無情説法初有情説法者即極樂國土衆鳥和鳴及諸天人民羅漢菩薩而説法也次無情説法者即微風吹動諸寶行樹及寶羅網出微妙音譬如百千衆樂同時具足是諸衆生聞是音者自然皆生念佛念法念僧之心等乃至樓臺殿閣光明遍照十方塵劫無不皆演妙法斯顯情與無情同圓種智二引大經證華嚴雲臺寶網共轉法輪鈔華嚴性海雲臺寶網同演妙音毛孔光明皆能説法又云塵説剎説熾然説無間説三世説衆生説等又偈云剎説衆生説三世一切説故清涼老人云花香雲樹即法界之法門剎土衆生本十身之正體是故動念無非法界觸目本是菩提故淨名云或有世界以光明而作佛事或有世界以飲食乃至語默動靜而作佛事等但能得法入心觸處逢如無非皆法輪耳三引古德意證是以撲落非他縱橫非物山河大地全露真常目擊道存吹毛大悟崖中端坐天帝散花何用文義而詮教體鈔古有一僧因掮柴薪路中忽然墮地作聲有省偈云撲落非他物等語云云目擊道存者出莊子文中因仲尼終日久慕溫伯直至見之夫子以目擊瞬視一言不發拱手而歸門人問之曰夫子終日欲見直至今日見之一言不語者何也孔子曰彼人者以目擊而道存何以語之也吹毛大悟者昔有鳥窠禪師侍者終日久事禪師一言不示侍者欲辭而去師問曰為甚去之侍者曰學人立事多年和尚一言不示故往別處再求佛法師曰我這裡濫賤的佛法汝何不求者曰何處願求指示師以身上拈取布毛一吹者忽然大悟即曰學人會也更不別求參學矣崖中端坐天帝散花者一日須菩提岩中端坐即有釋提桓因天主而來散花須菩提問曰散花者誰主曰是我因尊者善説般若故來散花者曰我乃無説主曰我乃無聞汝以無説而説我乃無聞而聞是故無説無聞以談實相何用文義而詮教體四引本經義證應知如來入城示衆托鉢回歸祇桓敷座善現擎拳無非直示家珍何容囑語叮嚀重宣饒舌者哉故下文云如來者即諸法如義鈔應知如來下即是如來行住坐臥穿衣吃飯語默動靜四威儀中師弟禮節等意無非尋常日用之事豈越人間分外之相有奇特也苟能觸處明如一卷離言般若宗旨早已為諸人注破了也何必要歸來趺座囑示叮嚀重宣饒舌者哉故孔子曰吾無隱乎爾吾無行而不與二三子者又中庸云鳶飛戾天魚躍於淵言其上下察也斯則以無言為言無示為示古德所謂任性逍遙隨緣放曠但盡凡心別無聖解耳三結示前義是以語默動靜皆説則見聞覺知靜聽苟能得法契神何必要因言説乃至八萬四千諸塵勞門衆生以此而為疲勞諸佛以此而作佛事鈔是以下若語言若默然若動若靜如瞬目揚眉等無非皆宣説耳則見聞下若見色若聞聲若覺若知通身六根無非皆聽聞耳古德云若將耳聽終難會眼裡聞聲始得如故曰苟能得法契神何必要因言説耶斯則總明法非定法應無所住而省其心也乃至八萬四千下言衆生本自觸處無生蕩然清淨良以無始無明熏習力故故舉心即錯動念即乖故淨土懺云毗盧遮那遍一切處其佛所住名常寂光是故當知一切諸法無非佛法而我不了隨無明流是則于菩提中見不清淨於解脫中而起纏縛等故曰八萬四千諸塵勞門衆生以此而為疲勞諸佛以此而作佛事又淨名云諸佛菩提在六十二見中求三總顯實相心法為詮此之一門義通三藏理遍諸門祖印相傳者惟此一事而已矣六攝境唯心文二初釋名義二初正標釋名第六攝境唯心體者總收前五並不離識鈔謂前之五體皆心所變以心外無法故如聲是色即二所現影況聲上缺曲假立名句文身色法是以聲色二法能詮之體及所詮之義并諸法顯義等離心外無體可得二略引唯識義證一切所有唯心現故鈔一切所有下引唯識義證以遮外境識表內心離識之外更無別法彼引多教義證成立唯識義旨所以證者以不籠統真如顢頇佛性故啓信論云依一心法有二種門一心真如門二心生滅門然此二門皆各總攝一切法以此二門不相離故梵行品云知一切法即心自性故唯心現二釋文二初立數然有四門二釋義分四初釋唯本無影一唯本無影謂即小乘不知惟識故鈔惟本無影者謂只知有聲名句文四法本質不知聲色如像故若知聲色如影像者以心外無法像色原空即了惟識故二亦本亦影三初正明本影二亦本亦影謂大乘初教佛自宣説若文若義皆是如來妙觀察智淨識所現名本質教鈔若謂如來實有説法故名本質因位説聽由於意識故果位中亦惟意識故云妙觀察智相應淨識以果位中智強識劣故説此識與智相應此智能於大衆會中雨大法雨故能説法智所依王即是第六故云淨識之所顯現而言淨者純無漏故唯識疏云既云無漏心現即真無漏文義為體是故世尊實有説法言不説者是密意説二引證二初佛地論證二初機感文義自生佛地論云有義聞者善根本願增上緣力如來識上文義相生此文義相是佛利他善根所起名為佛説鈔衆生今生有義聞者亦係衆生往昔修習善根發願親覲諸佛菩薩及大善知識念故得今世增上緣力得覲於佛由是如來識上文義相生此文義相是佛利他善根所説名為佛説者法華經中云舍利弗當知我本立誓願欲令一切衆如我等無異是佛利他善根同行起也今如來淨識上文義相生契機而説者是滿佛果德中願也二文義生佛自現若聞者識上所變文義名為影相此文義相雖親依衆生自善根力起而就強緣名為是佛説者展轉增上緣力生佛二識自然頓現鈔若聞者下單指衆生分上第六意識中所變文義名為影相非心外有法故此文義相雖親依下指佛自分中力也謂雖是衆生善根熏習之力到底而就佛強緣自誓願力而宣演之名佛説者展轉增上緣力生佛二識自然頓現者由衆生昔自善力及佛本自願力故感二互相應如鏡互照煥然齊現無前後際故二指本經義證二初機感生是知善現啓請佛宣章句皆由尊者及諸法會衆善根力始聞般若文義影相自識方現次佛自願力應如來昔誓願力熏習淨識而宣演之鈔法華經云如我昔所願今者已滿足化一切衆生皆令入佛道等其文非一三結彰本影互現彼此無非增上緣力皆繫唯識現故文義相生是為亦本亦影耳三唯影無本三初正釋無本義三唯影無本謂大乘實教離衆生心佛果無有聲色功德唯有如如及如如智獨存大智大悲增上緣力令彼所化根熟衆生心中見佛説法是故聖教唯是衆生心中影相二引經證義二大經云諸佛無有法佛于何有説但隨其自心謂説法如是此經云莫謂如來有所説法即為謗佛又云若以聲色見聞于我是人行邪道不能見如來等鈔初引華嚴證離衆生心佛果無有聲色功德唯有如如智等獨存次引本經證非但離衆生心而佛無有聲色功德然佛證自受用際中亦本來無有聲色故誡之曰莫謂如來有所説法即為謗佛以是法不可示言辭相寂滅故下偈重又誡之曰若以聲色聞我者是人乃墮有為坑中落邪見故以心外有法不能見如來法身也無非衆生機感有見而實如來無所見也三結歎唯影無本是以離衆生心佛本無聲色可得但隨衆生往昔自善根力心中見佛聲色者俱影相耳四非本非影三初正釋四非本非影如頓教説一切法界本無聲色影相言亡絶慮性本離故鈔疏引頓教義明非本非影一切法界本無聲色影相等者起信論云以一切法唯同如故當知一切法不可説不可念不可立是故此法從本以來離言説相離名字相離心緣相畢竟平等無有變異不可破壞唯是一心故曰言亡絶慮性本離故二引本經證義故下文云應離一切相是阿耨菩提故云非本非影三指略在廣龍樹等宗多立此義鈔龍樹等宗下等宗者等餘宗故謂龍樹依智度論總判離相以為宗要故此經破相顯性為此經之要義故下文云離一切相即名諸佛等又此四門前是小教以不了名等四法聲色是影像故二是始教故雖知是而未脫盡聲色意解還存法相見故三是終教以一聲色無本唯影故四頓教由離言絶待不可以智知不可以識識是故言語道斷心行處滅故非本非影耳七會緣入實三初釋名義第七會緣入實者前來六門同入一實故鈔夫唯心頓現一切法者緣會而生緣謝而滅前來六門同契真如實際法故法華云唯此一事實餘二則非真又云無量衆所尊為説實相印等二列數標名亦有二義一以本收末二會相顯性三釋文二初以本收末又二初正釋前中以聖教從真如流故不異於真攝論云此真如所流教法最為勝故此經破相顯性惟示真如金剛般若所流分教最勝殊妙超餘法故次引證本經如義下文云云何為人演説不取於相如如不動等斯即以本收末一一文字攝歸如故二會相顯性二初正釋二會相顯性者謂差別十二分教從緣無性即本真如故虗相本盡真性本現鈔如來言説皆順於如故金剛三昧經云如我説者義語非文衆生説者文語非義仁王二諦品云大王法輪者法本如應頌如乃至論義如等此經明教即是如不説如皆是教若取諸法顯義皆為教體一切法皆本如也則無如非教故云虗相本盡真性本現二引證下文云如來所説一切法即非一切法解曰既所説教從緣無性即非一切法也四結諸法如義斯乃從緣入實會相顯性即諸法如義而為教體鈔法華云諸佛兩足尊知法常無性佛種從緣起是故説一乘斯則總以諸法如如之義而為教體八事理無礙體分三初列名第八事理無礙者鈔由前因緣生滅之法從緣成立各無自性衆生不了由遍計性執取我法以為實有若除遍計依他無性即圓成故故前有會緣入實義所謂諸法從本來常自寂滅相四相同時體性即滅唯一真如無二法故今此門中以真如妙理不礙隨緣成立一切法故即理不礙事義而一切法又不礙凝然真如一味平等即事不礙理義如水成波波即水故由事不礙理理不礙事為之事理無礙法界而為教之體故二釋文三初理不礙事義謂一切教法舉體真如即不礙十二分教事相燦然故云如來説一切法即非一切法是故名一切法鈔以真如體雖非生滅而隨緣自性成立一切法故法華云是法住法位世間相常住於道場知已導師方便説即舉體真如不礙十二分教事相燦然若有礙者焉能説之又云於一佛乘分別説三一佛乘者即真如義也分別説三者由真如故成立一切法也是故諸大乘經總依真如實相而為根本又云一切賢聖皆以無為法而有差別故云如來説一切法下引經證成可知二事不礙理義雖真如舉體為一切不礙一味平等故云如來説一切相即非一切相鈔由真如法體雖是隨緣一切法等而一切法等相又不礙真如平等一味故法華云諸法從本來常自寂滅依他無性即圓成故三雙證二義無礙又云是法平等無有高下是名阿耨菩提解曰無高下者性相融鎔真俗一貫是為一味平等無高下故鈔起信論云一心中有二門一生滅門二不生滅門以此二門不相離故又云心真如者即是法界大總相法門體所謂心性不生不滅一切諸法惟依妄念而有差別若離心念則無一切境界之相乃至云畢竟平等無有變異不可破壞唯是一心故名真如故曰性相圓融真俗一貫乃為一味平等無二法故九事事無礙義三初釋名第九事事無礙體者謂前八門俱收此經以為教體雖後二門未收此經其少分義亦兼攝耳鈔釋名來意可知更不繁釋二釋文二初正釋何則夫談真則違俗舉俗則違真今既真俗圓融事理無礙義故亦有事事無礙體也鈔談真則真顯俗隱而違之也談俗則俗顯真隱而違之也今既真俗下謂由真非俗外而俗不違也俗非真外而真不違也是故即俗而真即真而俗用不離體體不離用也故大經云菩薩以有為界而不滅壞無為之體以無為體而不滅壞有為之相又無為體即有為故一即一切以有為相即無為故一切即一一即一切一切即一故即事事無礙體也二引證二初引大疏義證清涼云理隨事變則一多緣起之無邊事得理融則千差涉入而無礙今夫一般若法理貫十門義通三藏八萬行門百界千如以一貫之豈非一法即多法多法即一法二引心經義證是故心經以般若空義貫通五蘊六入十二處十八界世出世間聲聞法緣覺法菩薩法乃至涅槃三世諸佛皆依般若法故而證阿耨菩提若百川歸海普同一味雖以一滴逈異百川以一味義具多味故鈔大疏云一切諸法真心所現如大海水舉體成波以一切法無非一心故大小等隨心回轉即入無礙十海印炳現體文三初釋名十海印炳現體者鈔華嚴大疏云譬如大海普印四天下一切森羅萬象無不炳現如來海印定光三昧亦復如是而能普印一切色身三昧故下偈云或現童男童女身天龍及以阿修羅乃至摩睺羅伽等海印三昧威神力等即以海印炳現而為教體也三釋文三初正釋如前差別無盡妙義皆是如來海印定中同時炳現雖此經義未曾唱明然默契心源海印定光亦含此義是知舍衛托鉢洗足跏趺一動一靜一語一默皆如來性識浪渟湛如巨海月落澄潭本非來去二引證故經云如來若來若坐若臥是人不解我所説義何以故如來者無所從來亦無所去故名如來三結嘆是知二門義屬兼通未若華嚴博唱帝網重重無盡無盡故慎勿局定以説無耳三總結十義以上第五教體淺深一科已竟
