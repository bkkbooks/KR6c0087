body:
  text: 敕建西天寺武林後學沙門性起述四乘所被三初標第四乘所被機者二開列章文二初通括大意分五初生佛均體夫以物我無虧人人本具是以般若空慧上至聖人下至凡流均本同源照體獨立鈔古德云天地與我同根萬物與吾同體故一切聖凡皆以般若空慧而為其本故曰均本同源照體獨立以從本以來不變易故二迷悟有殊迷之者永劫沉淪悟之者剎那而得鈔迷者即是眾生悟者即是諸佛固能達本同源了妄即真奚有生佛之可異哉三見聞成種奈生迷而不覺故聞說無生之義或驚或疑或信或不信者皆成般若之緣種也何況信受奉持如說修行等自然直至道場無迂曲故四徵何機得入然此經者既惟一代時教始終一味未知被何等機而能可入五被機列數文然法雖一味機分有十前五揀非器後五彰所為二正釋文二各五初科揀五非器文中一揀無信非器二初正揀一無信非器以聞般若空義不解反生誹謗鈔佛能度一切眾不能度不信人及無緣人是以陳東老母與佛同生尚不受化況餘者乎故曰無信非器不堪領聞般若設或聞者不生信解反生誹謗法華云破法不信故墮於三惡道我寧不說法疾入于涅槃二引經證義下經云我若具說者或有人聞心即狂亂狐疑不信墮惡道故鈔我若具說下證成不信之義二揀違真非器二初正揀二違真非器依傍此經以求名利不淨說法集邪善故鈔違真下心地不朗單依語言文字而不求於真實第一義諦唯尚希求名聞利養恭敬而說法故所以心不淨也故爾心清淨故不為利養乃至沙彌以求真實第一義諦是佛說也倘有絲毫為利說法是魔說也故云集邪善故二引經證義下經云若心取相即著我人眾生壽者相故三揀乖實非器二初正揀三乖實非器謂如言取文超情至理不入心者鈔乖實非器下乖違真實第一義諦故所以違實義者謂此人專依語言文字執取見解墮落筌蹄故不能超情量脫見解謂于至極玄妙理趣未得入于心故二引經論證三初先引論證故論云隨聲取義有五種過鈔隨聲取義者古德云隨文生解三世佛冤離經一字即是魔說有五種過者一不正解二退勇猛三誑他四者謗佛五者輕法二引經證義下文云若取法相即著我人眾生壽者相故三結上三機上三凡愚非其器故四狹劣非器二初揀機四狹劣非器謂一切二乘墮無為坑者皆不入故鈔狹劣非器下華嚴經云如來智慧大藥樹唯除二處不能為作生長利益所謂一切二乘墮於無為廣大深坑及壞善根非器眾生溺大邪見貪愛之水然亦於彼曾無厭捨二引經證義下文云若樂小法者著我見人見眾生見壽者見即於此經不能聽受讀誦為人解說故五守權非器二初正揀守權五守權非器謂有權教大士經無量劫每日三時行施捨身命故以及七寶滿大千界鈔法華經中智積菩薩云我見釋迦如來于三千世界乃至無有如芥子許非是菩薩捨身命處斯則內施無盡以及七寶下外施不竭由是內外弘施無量所謂檀度之勝無可比也二非器假名若未聞般若無我之法或時聞已不信不解不順不入者是等猶為假名諸菩薩故鈔雖廣行施亦在大士之數若未有二種善根是為假名菩薩一者未聞般若由未聞故云何了知無我法也二者已聞般若雖聞般若不信由不信故不解由不解故不順不入是為修狹劣之輩豈超十地五忍之果哉後五彰所為中分五初正為機三初正揀一正為謂一乘頓妙之法原非下劣機宜可能承受鈔法大機小不能契合機大法小亦不能契合是以圓頓機契合圓頓法而承受之二引經證義三初為發大心機故經云如來為發大乘者說為最上乘者說次證由具法器又云如來悉知是人具大法器成就無量不可思議功德如是人等荷擔如來阿耨多羅三藐三菩提故三證久種善因又云若有持戒修福者于此章句能生信心以此為實當知是人已於無量千萬佛所種諸善根三結歎良以多生入正定聚故聽文字般若即入觀照生信了悟真常苟非廣多供佛具善根者何能成就者乎鈔一十信未滿名為未入定聚于六塵中心不空寂故聞般若妙旨而不解故專信十善因果親覲大乘知識種諸善根熏習之力故未入定聚二者已入信位頓發大心故聞般若之法一言之下心地開通于六塵境廓徹清淨了達自性本來即佛無用外求名為入正定聚故聽文字般若即入觀照生信了悟真常苟非廣多下由多生佛前勤修戒定慧等具諸善根般若種力未得心地開悟今復重聞自然於聲色境觸處圓明照體獨立耳二兼為分三初正揀二兼為謂或有人敬信此法聽聞受持讀誦雖未悟入而能信向成種如人食少金剛等鈔問經得意旨心領神會方能信向成種今既單信語言文字奚能信向成種乎答雖聞語言文字般若信向成種者即無漏妙法熏入第八識有漏心中或敬或信或受持或讀誦或供養皆斯親厚般若之法力也由今生有漏心中熏入至于因圓果熟即成無漏之種子也如人食少金剛等等者等餘文故普賢大士告如來性啟菩薩云如人食少金剛必竟要穿於身出在其外何以故金剛不與肉身而同住故菩薩摩訶薩亦復如是若聽聞諸佛妙法必竟要穿一切有為身過到於無為一切智地故曰金剛種入如來藏等云云二引經證義故經云乃至一念生淨信者如來悉知悉見等是諸眾生得如是無量諸福德故雖今未解後必得入鈔淨信有二一者宿生多修施戒少聽大乘般若今生雖聽唯信大乘未得深悟亦名淨信二者宿生已信大乘深解般若今又重聞得法眼淨名為淨信今此淨信簡非久熏即以凡夫有漏心中新熏無漏文句之法雖未明悟即熏成文字般若而漸成無漏之福德耳故云如來悉知悉見得如是無量諸福德故所以然者以無漏福德即達摩所云淨智妙圓體自空寂如是功德不向外求則為自性中常光受用之福德法華經云佛子住此地是則佛受用常在于其中經行及坐臥故云雖今未解後必得入三結歎當知是人聞熏種子不可思議果報亦不可思議鈔唯識論云種子有三一聞熏種子二修習種子三果德種子今此三種種子義中復有其二一者有漏種子二者無漏種子夫熏有漏種子即是人天十善因果之法若熏無漏種子即是文字般若無漏妙法是知欲入道者先得聞熏般若無漏種子後得修習及果德種子而成就也故云聞熏種子不可思議果報亦不可思議矣又聞熏種子即是因不可思議以熏無漏法故果報即果德種子以成菩提涅槃常樂我淨諸果德故即果德不可思議也雖不云修習而聞熏及果德二種種子義含在其內故不云耳三引為機二初正揀三引為謂即前權教取相菩薩未能入者故借大權示現在小乘位者啟請般若妙門重重詳究令破諸疑深契無生豁然頓悟感傷悲泣俾令權教大士自生慚愧小乘尚以聞悟況大乘乎二引經證義故下文中尊者涕淚悲泣而白佛言我從昔來所得慧眼未曾得聞如是之經故四權為機二初正揀四權為即一乘取相凡夫謂既不聞況能受持故諸菩薩權示聲聞或在法會如聾若啞五百之徒彰其絕分鈔即一乘取相凡夫者即人天小教及聲聞機眾之類謂既不聞下由是取相凡夫可知總在心外有法並不知諸法從本以來常自寂滅相故諸菩薩下謂諸大士等權示聲聞影響大化利濟小乘諸群類眾令彼聲聞回心向大故法華經中佛讚富樓那等云諸比丘諦聽佛子所行道善學方便故不可得思議知眾樂小法而畏於大智是故諸菩薩作聲聞緣覺以無數方便化諸眾生類自說是聲聞去佛道甚遠度脫無量眾皆悉得成就等其文非一或在法會下即華嚴會上有富樓那須菩提及大迦葉等五百之眾在佛法座如聾若啞有眼不見有耳不聞故曰五百之徒彰其絕分非實在法會而不聞也二引經證義或示在道而啟悟者如須菩提等即斯類故鈔謂須菩提等本自現住小乘位中單明偏真生空之法未達二空真如妙理然斯尊者久證無生善通佛慧因見小乘羅漢等未達大乘妙理故須菩提等權示聲聞未解二空啟請如來般若妙門重重詳究自破諸疑引令悟入奇哉觀彼須菩提等向我同類亦是小乘尚已聞悟而我等輩豈無仰攀焉不悟入若如斯者入大乘位豈不快哉故古德云彼既丈夫我亦爾何得自生而退怯誠哉斯語也五遠為三初正揀五遠為諸凡夫外道闡提悉有佛性邪知傍見自稱教法或混亂佛宗法說非法非法說法求其利養雖今不解後必得入鈔遠為機者現遇正法未解反以錯謬亦作未來利益因緣名為遠為由種般若力故謂諸凡夫外道闡提下西天有九十五種外道永斷善根不信正法名為外道闡提疏云邪知傍見自稱教法者或計冥諦為宗或想梵天為本或謂時方微塵虗空等而為世間及涅槃本廣如華嚴玄談中說或混亂佛宗下即此方攻乎異見之類也或計無為為宗或想天主為本或稱彌勒為因或說無生老母遠在靈山妄立三乘二乘大乘教法或說圓明妙道為本如斯等種種因緣混亂佛宗法說非法非法說法所謂非法說法者或立虗空斷滅之性而作常住無生之法法說非法者反以妄剝施等六度是為有漏之因唯以一念無生即是涅槃本際奚得徒勞苦行反修無益之因故取諸祖語錄極易解者以作憑據及取金剛大乘妙典之文亦謂自云辟邪顯正又恐世人未解深語故拈取佛典妙句編作粗陋之言而令世人種種易解引入他宗又復採取玄門修身鍊氣之法以為每日自修工夫還有種種異說難以盡舉更引儒門無極而太極等語發明各人本來面目并引歷代祖師妙句等語皆係參詳在內混亂佛宗穿作一處謂之三教同源可以廣化迷流共成正覺廣如此方外道似佛弟子非佛弟子等或以無為為宗及三乘等教五部六冊書內等說又復彼教雖談空理的指目前虗空以為無生大道故爾妄闢施戒等事則為無益之行貶斥小乘羅漢實非大道而有令人獨坐妄思修學醍醐灌頂腦後拔門眼為明珠寶乃至身為現世寶等是為七寶在人身中若是識得立地成佛無施多力毒哉真魔說也夫既深信因果求出苦輪故爾等妄求一念無生到歸元處永無生滅云何而有令人醍醐灌頂身中七寶等說若如斯者豈非乃犯自語相違之過又云無生焉得有生爾既又念生死苦惱痛恨貪嗔癡等而為根本云何執定不用出家以修道果乃至妻子五欲不礙菩提既云妻子五欲不礙菩提云何專又教人戒殺永斷葷酒夫五欲者是生死之毒蛇出五欲者離煩惱之火宅若不出家云何能裂斷愛網絕諸五欲設不出家共同妻子五欲眷屬總然修行得證道果者無有是處如非久證無生即若龐公王日休之類者百中無一二若我等果如龐公日休高士之類總然塵境修行亦何有礙故文殊飛簡于裴國相云大士入俗小士出塵苟無此力故古德云毫𨤲繫念三塗業因故須要永斷淫殺盜妄飲酒食肉之戒方有出塵消息如不然者若不投禮明師廣通經論即若蒸沙作飯必無實果故云寧之千生不悟不可一生著邪然雖如是亦能遠作菩提故曰雖今未解後必得入二引經證義故經云或有人聞心即狂亂不生正解起斷滅見或執邪見狐疑不解竟謗毀者必墮惡道罪報若竟一經於耳果報緣種亦不可思議耶三釋通妨難四初問問既聞妙旨不解生謗何得還成果報之不思議耶次答難答先聞妙旨不解生謗是以罪報盡而福報生由此而增信入者也三引證義故法華經中四眾聞常不輕語謗墮苦處罪報得出還遇不輕教化豈非般若緣種深妙也哉四結歎況一切眾生本具如來智慧德相感應道交不可思議無一眾生而非不可被也鈔華嚴云如來成正覺時作如是念奇哉怪哉一切眾生皆具如來智慧德相只因妄想執著不能證得若離妄想一切智自然智無礙智即得現前故曰無一眾生而不可被也三結以上第四教所被機一科已竟
