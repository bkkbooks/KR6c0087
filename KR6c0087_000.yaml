  text: 金剛般若波羅蜜經懸判疏鈔卷序敕建西天寺武林後學沙門性起述將釋此經判義分三初通序大意文八初通敘大意分六初標題金剛般若波羅蜜經者鈔云此題法喻雙彰華梵為目通別為名法喻者金剛是喻般若等是法華梵者金剛是華言般若波羅蜜是梵語若具梵語者跋折羅般若波羅蜜此云金剛智慧到彼岸通別者經之一字是通以三乘十二分教俱名為經故金剛等七字為別不受餘稱故餘義等釋後文中辨恐煩不引二除我法却衆生之我見除遍計之異情鈔云四見中以我見為首故我者於五蘊中妄計我我所故人者妄計我生人中轉於餘趣故衆生者妄計五蘊和合而生故壽者妄計我受一期果報若長若短故斯皆顛倒妄想亦名四見今云却衆生之我見者下文云若菩薩有我相人相衆生相壽者相即非菩薩又云我當滅度無量衆生即不名菩薩若菩薩通達無我法者如來說名真是菩薩云菩薩者梵語華言是大道心亦名覺衆生故云却衆生之我見也遍計者謂周遍計度我人衆生壽者四見異情者異見情執法非法相斷常二見今云除者謂除去我人衆生壽者法非法相故下文云是故不應取法不應取非法以是義故如來常說汝等比邱知我說法如筏喻者法尚應捨何況非法此除遍計之異情也三示宗趣以破相顯性為宗以觀照實相為趣鈔云語之所尚曰宗宗之所歸曰趣又宗者主也唯以此法而為主故今此經大意專以段段破相故云凡所有相皆是虗妄又云不可以三十二相得見如來又云如來所說身相即非身相此即破除我法之相也又云若見諸相非相即見如來又云離一切相即名諸佛此則顯依他無性即圓成故是頓彰般若性也故云以破相顯性而為宗故觀照者文云一切有為法如夢幻泡影至應作如是觀者即觀照般若也實相者則真實之相也經云不取於相如如不動者即實相般若也由前因聽文字般若章句一念淨信方得破相顯性見道了明從解起行即入觀照念念反觀真際路斷煩惱障及所知障而證實相般若水天一色露圓明耳故以觀照實相而為其趣也又以觀照為宗實相為趣故思之可知也四法喻申明示般若源悟金剛性鈔云示文字般若悟金剛性示觀照般若修金剛性示實相般若證金剛性金剛有堅利明三義謂堅喻實相利似觀照明如文字此三般若義雖有三其性無殊此金剛性不可破壞妙體常恆故又此金剛性體大般若相大波羅密用大此體相用一即三三即一者無二法故所謂斷盡無明朗然大覺唯一金剛心故五示真俗無礙於妙有中全露真空於真空中全彰妙有鈔云此顯不二之旨也心經云色不異空空不異色色即是空空即是色受想行識亦復如是舍利子是諸法空相不生不滅不垢不淨不增不減等斯乃即五蘊而全露真空即真空而全彰五蘊然五蘊性虗本自空寂全露真常如波即水無二法故真空體實隨緣應用故有五蘊如水成波波因水現楞嚴云性色真空性空真色乃至五蘊十二處十八界全是妙明真性中之影像耳故云若能轉物即同如來此經云若見諸相非相即見如來又云如來者即諸法如義是以黃花無非般若青青翠竹本是真如故知事依理成理依事顯起信論云一心中有二門故一心真如門二心生滅門以此二門各攝一切法不相捨離又云此真如體無有可遣以一切法悉皆真故亦無可立以一切法皆同如故當知一切法不可說不可念故名真如此雖顯真如門而全彰妙有不離如故此經云不取於相如如不動等此總顯真俗圓融二諦無礙不二之旨也六引經結歎故云是法平等無有高下是名阿耨多羅三藐三菩提之法門也鈔云此即證成真俗圓融不二之旨也是法者即妙有而真空即真空而妙有之法也即真空而妙有不增即妙有而真空不減故云平等無高下者在聖而不高在凡而不下在涅槃而不高在生死而不下良由迷悟不一故有差殊於法體中本來平等無高下故是阿耨多羅三藐三菩提之法門也阿耨等者梵語此云無上正等正覺即成佛果位之名耳法門者法即軌持義門者出入義謂三賢十地等妙二覺莫不由斯般若之法軌持出入門故是以菩提薩埵依般若波羅蜜多故得阿耨菩提者其斯之謂歟以上通敘大旨一科已竟二諸位取三般若得一心常住分四初五位妙果因何得就故三賢十聖等妙二覺得無上菩提者鈔云十住十行十向為賢十地為聖等妙二覺為超地之聖又三賢為十地之因十地為三賢之果十地又為等妙二覺之因等妙二覺又為十地之果三賢為解行菩提十地為分證菩提等妙二覺為究竟菩提雖賢聖信解行證不同而究竟所得者唯一無上菩提故經云一切賢聖皆以無為法而有差別二因修三般若故而得妙證三一依文字般若得見道分必先從文字般若一念生淨信者鈔云一念淨信者即頓開圓解佛知見故經云是諸衆生無復我相人相衆生相壽者相無法相亦無非法相以頓忘人法解真空故皆從文字般若而得見也若約位次正是十信位滿得見道分若約六即佛中正是理即佛後得名字即佛也二依觀照般若得修道分然後而修觀照般若鈔云見道分後以般若智圓照法界超現量見了達五蘊身心世界蕩然清淨惟一真如無差別故所謂念念照常理心心息幻塵遍觀諸法性無假亦無真從此空假中三觀次第深入方了一心不二之本漸修離相妙行大智大悲不住生死及涅槃故以隨順無住法性廣大妙理故若約位次正三賢位滿得修道分若約六即佛中依教修行法眼圓明始起觀行則得觀行即佛漸次深入空假中妙行還未得分證中道只得相似即佛也三依實相般若得證道分不取於相如如不動而證實相般若鈔云由前修道分中解行成就方得分斷無明分證真如不取性相忘緣等照任放天心以無功用行得入薩婆若耳若約位次證十地位乃至究竟斷盡生相無明進超等妙二覺諸地位故是謂得證道分若約六即佛中得分證即佛及究竟即佛也三因妙證般若故得一心所以故得了六度而即一心悟萬行而即一體所以一切色無非佛色一切相無非佛相鈔云三施該六度六度該萬行由前以證實相般若窮徹圓明大覺諸位故能於菩提果上見昔因位中所修六度萬行皆攝一心常住本體所以於妙果菩提之中證一切色無非佛色證一切相無非佛相又佛者覺也覺一切色一切相無非妙果之色妙果之相故即以般若波羅密多之法而為其本也四引偈證成妙體常住故云如來色無盡智慧亦復然一切法常住是故本圓明鈔云此偈證成上來一心常住所以如來色者即真如妙色也隨緣應用不變不異根根塵塵周遍法界故爾全體解脫具攝無邊廣大智慧遍照諸法本自圓明本自常住故華嚴云如來成正覺時入一相三昧得一切衆生量等身得一切剎量等身得一切三世量等身得一切法量等身得如是無量無數清淨三輪等身皆同一相所謂無相等故云一切法常住是故本圓明以上諸位修三般若而得妙證一心已竟三釋通妨難令生正見分三初由遍計執故有根塵應知根塵器界全是遍計所執鈔云由難云既法本常住本自圓明衆生日用何故而不覺知何故而不見耶故今釋曰動靜理全是行藏事盡非冥冥隨物去杳杳不知歸真以根塵器界全是妙明真性中所現之物宛似空華凡情不了用遍計性周遍計度妄執以為實有盡成虗妄者耳如暗室之繩踏之以為蛇者即斯類故二若破遍計見圓成故若除遍計依他無性即圓成故鈔云唯識論云此性是唯識實性略有二種一虗妄性謂遍計所執二真實際謂圓成實性為簡虗妄說實性言復有二性一世俗謂依他起二勝義為圓成性為簡世俗故說為實又遍計性情有理無依他性相有性無圓成實性理有情無此約法相宗義若約法性宗義其實依他無性即圓成故由却除遍計故能轉物即同如來三依正如如本法界故故說生界不減佛界不增山河大地全露真常鈔云由上依他無性即圓成故此圓成實性遍流六道而未曾減往成聖道而未曾增唯一法界常住妙理頭頭本是真如法法無非般若故古德云聞聲見色蓋是尋常這邊那邊應用不缺所以山河大地全露真常緑水長天彰法身故以上妨難釋通已竟四依信解行證得成妙果固能依此信而信之依此解而解之依此修而修之依此證而證之入法界之玄門成諸佛之妙果鈔云依此信而信之者大品云一切法不信唯信般若名為真信即開佛知見故依此解而解之依此修而修之者依解起行即示佛知見故依此證而證之者行起解絶斷十障證十如即悟佛知見故入法界之玄門成諸佛之妙果者斷盡生相無明五住究竟即入佛之知見故又六句中前一句是信成就發心次二句是解行成就發心後三句是證成就發心起信論云三發心也問前者已明信解修證斷惑之意今者何又重明答前是明五位行人因修般若已證菩提今所明者的指行人自修之法乃成妙果故未重也以上釋行人得信解行證妙果已竟五般若因種善根始得信受分二初標讚法勝是知般若之法諸法中王鈔云是知者承前契後之辭諸法中王者彌勒偈云實智為了因亦為餘生因了因者是證菩提法身妙果之根本也餘生因者為諸度妙行及報化之根本也故經云一切諸佛及諸佛阿耨菩提法皆從此經出故二因多善得入苟非一佛二佛三四五佛而種善根已於無量千萬佛所種諸善根始能信而受之捧而讀之也鈔云夫般若之法如摩尼寶珠能濟一切諸渴乏者但無福人決不得見況能受持故多生纍劫親覲無量諸佛於一一佛前常修戒定慧等資糧助道妙行之力始能信而受之捧而讀之也六持法妙行福廣難量分五初持行福勝是以受持者功超餘行讀誦者福過恆沙鈔云深信曰受受而領納曰持閲本經文曰讀離本朗念曰誦夫以歷曠劫而修行遍恆沙剎而行捨若不知般若無我之法朗徹心源終成費行如蒸沙作飯必無實果是以釋迦如來歷覲八百四千萬億那由他諸佛悉皆供養承事無空過者若復有人於後末世能受持誦讀此經於我所供養諸佛功德乃至算數譬喻所不能及供佛之行尚不能超況餘行乎是故總經恆沙大千世界七寶以用布施皆成有漏之福豈成無為妙果菩提涅槃常樂我淨者哉故持般若一行福過恆沙未作奇也二竪橫較量十虗較量難以測其邊三千施寶無以探其際鈔云一橫較二竪較先橫較量者謂十方虗空尚不能較量況比餘法之類而能及哉經云一人發真歸元十方虗空悉皆銷殞斯皆般若性現之力也次竪較量者謂七寶布施皆落有為增長生死徒益煩多永嘉云住相布施生天福猶如仰箭射虗空勢力盡箭還墮招得來生不如意爭似無為實相門一超直入如來地故三千施寶無以喻之也三天人供養在在則人天供養時時則舍利分彰鈔云夫般若是三世諸佛之母故一切如來悉皆供養最為尊重故法華云十方諸如來并過現未來亦見亦供養亦令得歡喜是人之功德無邊無有窮如十方虗空不可得邊際況世間一切天人阿修羅等而不供養者乎舍利者梵語此云身骨乃佛滅度後茶毗身骨有八萬四千大數金光明云若人得一舍利如芥子許能供養者決定托生三十三天受無量妙樂此乃色身舍利非法身舍利之體經云隨說四句偈等所在之處即為有佛故云時時則舍利分彰也若人得一四句偈等能奉供者得證菩提豈可思議福德而較量哉四歷耳成種一歷耳根永為道種鈔云若種餘善即成人天小果有漏之因若薰般若妙善一歷耳根如人食少金剛種子盡未來際不可破壞畢竟要穿一切有為煩惱身過到于無為一切智地所以金剛種入如來藏瓜豆云何得錯根此之謂也五彈指頓超彈指合掌頓超劫海鈔云夫以深信則讚讚則歸依以頓忘人法了真空故是以超曠劫之無明越恆沙之生死故我世尊往昔一聞般若妙旨則不隨生死流布而成十地妙果故佛告須菩提言當知是經義不可思議果報亦不可思議法華云聞法歡喜讚乃至發一言則為已供養一切三世佛者即斯類故以上持行難量已竟七舊疏新章聞名周廣稽古注疏千百餘家望今解釋循方遍滿聞名者盡娑婆界仰望者普遍塵沙鈔云疏文分二一注疏繁多二聞名遍遠注疏繁多者謂三十二大士各說不二法門五百比邱各說身因解脫但能令人一言之下心地開通者皆得以作龜鏡苟非如來冥承付囑何得注疏千百餘家而流通者乎二聞名遍遠者謂般若之法非但盡娑婆界而聞名乃至盡法界以普周窮塵剎而宏遠莫不以斯般若之法利濟含生故大經云三世諸佛已說今說當說我今亦如是說佛子我不見有一個國土如來不說此十地法何以故此是三世諸佛向菩提道最上法故起信論云一切諸佛本所乘故一切菩薩皆乘此法到如來地故此經云涅槃三世諸佛依般若法而證阿耨菩提是以經律論等皆以般若而為其本豈聞名者以局一方之境乃通方之妙道也是以塵沙界而弘傳則塵沙界而仰望皆是如來護念此經威德力故豈虗謬哉八因利他切略述疏章豈豫膚見陋學以管窺天敢言測度者哉無非利人心切毛頭許智投入佛心余雖凡夫亦無棄耳難云舊疏新章廣多無數何必要今重出故今釋云因利他切略述疏章豈者承前之義豫者自謂之辭膚見者淺見也陋學者學之至敝也夫以法海無涯豈虗空之可度般若宏遠較塵剎而難量況以淺見陋學之人其猶以管窺天用蠡測海敢以胸談臆見而能度量者哉無非利人心切頓忘膚見之能以毛頭許智欲測佛心故清凉云我今欲以一毛智測量無邊法界空是以塵培華嶽無增萬仞之高露滴天池喜合百川之水豫雖凡夫者泛常之流也經云凡夫者即非凡夫是名凡夫但能初心一念即頓開知見深信般若研窮佛境耳故大疏云即凡心而見佛心事理雙修依本智而求佛智未能自度先欲度人者菩薩發心也況夫如來常以般若護念諸大菩薩豫雖凡夫亦無棄耳自然冥承護念俾令行者般若妙心朗然悟徹命筆所述量投佛意耳以上通序大意一科已竟二歸敬請加分三一歸敬稽首法界海十方調御師般若諸大士信解比邱僧復禮須菩提古今宏法者鈔云先明一體三寶後顯別相三寶若總若別悉皆歸順心冥道合無二無不二故先總明者謂稽首二字能歸行人法界海者即行者所緣境故今初稽者屈也至也首者頭也謂欲述疏意先通三寶特舉三業虔恭敬仰屈己頭頂以至于地心冥佛境口誦辭句剖析心誠乞求加護問何故最初歸敬三寶答別行鈔云略有七意一顯示三寶俾令久遠流通自他二利吉祥故二令人發生深信不生疑惑故三令知恩德由三寶力方成慧解故四儀式應然如世臣子凡所作為先稟君故五表有承稟三寶證明顯非胸臆故六像季傳教障難由多先敬三寶請加護故七西天諸菩薩僧造論釋經皆先歸故由斯七意故祈請加能皈三業深入法界遍禮三寶是以捨三業而攝歸一心捨一心而歸三寶故稽首而歸依也云法界海者謂一切三寶不離法界法界不離三寶況一真法界一切諸佛斷無明盡而親證一切諸法從法界海流一切菩薩分斷無明分證法界一切僧衆依法界海而修行故經云一切聖賢皆以無為法而有差別無為者即一真法界之妙理也又一真法界即具同體三寶義理謂法界中有大智光明遍照義故即是佛寶法界中能軌持恆沙性功德故即是法寶又性相圓融和合義故即是僧寶又佛即是法法即是僧故云法界海耳所云海者謂法界中既具一體三寶即法界性中之德猶若大海普容無量諸珍寶故以上同體三寶義已竟次別相三寶者一大乘三寶二小乘三寶三住持三寶又佛不是法法不是僧自為差別相也初大乘有三者法報化三身或具十身是為佛寶六度妙行八萬四千無量法門是為法寶三賢十聖等妙二覺是為僧寶次小乘有三者五分法身是為佛寶四諦十二因緣是為法寶四果四向是為僧寶後住持三寶亦三金銀銅鐵七寶所成或泥塑木刻寫畫形像是名佛寶西方貝葉此方竹帛黃絹紙墨筆硯而成是名法寶剃髮染衣受諸大戒習行定慧弘闡正法是為僧寶所云寶者謂三寶恆住世間最為殊勝良友福田世出世間最尊最貴名之為寶今此文中十方調御師是為大乘佛寶般若是為大乘法寶諸大士者是為大乘僧寶問為甚不舉釋迦師者何也答以本師即諸佛之一數耳又無量法門單舉般若者以諸中中王故次信解比邱僧復禮須菩提者即小乘三寶中僧寶也問小乘三寶中獨舉僧寶而不舉佛法者何也答以大乘統攝故今歸向者以同在會上回心向大深信般若故偏歸也又比邱僧中獨舉須菩提而不舉餘者何也答以須菩提是請法之首故古今弘法者即住持三寶中僧寶也問何得獨舉住持僧而不舉餘者答以住持中弘法僧寶最為勝故謂因僧弘闡故知有法知法即知佛有無量功德故偏歸舉二請加願以同體慈冥承善護念句句合玄宗言言投佛意鈔云謂三寶有無量勝德今略舉一二一者大慈二者大智云慈者四無量心之首故又是諸善中王故云智者諸佛菩薩具恆沙妙行以般若智母而無其本以慈行不住涅槃故以智行不住生死故是以不住生死不住涅槃即斯無住妙行中同體慈同體悲同體智同體神力以天眼遙觀天耳遙聞他心速鑑無礙見聞冥承護念之力俾令行者圓覺妙心豁然開悟所析妙義句句得合玄宗之旨言言投佛意故三回向回施諸有情共證無上果鈔云回向有三意一回向真如以修一切妙行理觀冥同實際無障礙故二回向衆生將此所述疏意自利利他施與衆生了般若故三回向菩提願令我及有情得無上菩提證常樂我淨無餘大涅槃故以上行者三回向心即起信論中三心圓發之文一直心正念真如法故二深心樂修一切諸善法故三大悲心普救一切諸衆生故以斯三心圓發之旨即合三心回向之意雖辭少有不同而大意之旨理實貫通思之可得也以上歸敬請加一科已竟金剛般若波羅蜜經懸判疏鈔卷序
